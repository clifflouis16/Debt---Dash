<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Dash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, memo } = React;

    const formatCurrency = (amount) => (parseFloat(amount) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const calculateMinPayment = (balance, rate, issuer = 'chase') => {
      const b = parseFloat(balance) || 0;
      const r = parseFloat(rate) || 0;
      if (b === 0) return '0.00';
      const mi = b * (r / 100) / 12;
      if (issuer === 'chase') return Math.max(40, b * 0.01 + mi).toFixed(2);
      if (issuer === 'navyfed') { if (b < 20) return b.toFixed(2); return Math.max(20, Math.ceil(b * 0.01) + mi).toFixed(2); }
      if (issuer === 'discover') return Math.min(Math.max(35, b * 0.02, 20 + mi), b).toFixed(2);
      return Math.max(b * 0.02, 25).toFixed(2);
    };

    const calculatePayoffTimeline = (cards, monthlyPayment) => {
      if (!cards.length || monthlyPayment <= 0) return null;
      const sim = (sorted) => {
        let months = 0, totalInterest = 0;
        const c = sorted.map(x => ({ ...x }));
        while (c.some(x => x.balance > 0.01) && months < 600) {
          months++;
          let rem = monthlyPayment;
          c.forEach(x => { if (x.balance > 0) { const i = x.balance * (x.apr / 100) / 12; x.balance += i; totalInterest += i; } });
          c.forEach(x => { if (x.balance > 0 && rem > 0) { const p = Math.min(rem, x.balance); x.balance -= p; rem -= p; if (x.balance < 0.01) x.balance = 0; } });
        }
        return { months, totalInterest };
      };
      const base = cards.map(c => ({ balance: parseFloat(c.balance), apr: parseFloat(c.apr) }));
      return {
        avalanche: sim([...base].sort((a, b) => b.apr - a.apr)),
        snowball: sim([...base].sort((a, b) => a.balance - b.balance))
      };
    };

    const getCardSymbol = (i) => ['●', '■', '▲', '◆', '★', '♦', '▼', '◉', '◈', '◇'][i % 10];
    const getCardColor = (i) => [
      { bg: 'bg-rose-500', text: 'text-rose-400', border: 'border-rose-500' },
      { bg: 'bg-blue-500', text: 'text-blue-400', border: 'border-blue-500' },
      { bg: 'bg-emerald-500', text: 'text-emerald-400', border: 'border-emerald-500' },
      { bg: 'bg-purple-500', text: 'text-purple-400', border: 'border-purple-500' },
      { bg: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500' },
      { bg: 'bg-pink-500', text: 'text-pink-400', border: 'border-pink-500' },
      { bg: 'bg-teal-500', text: 'text-teal-400', border: 'border-teal-500' },
      { bg: 'bg-orange-500', text: 'text-orange-400', border: 'border-orange-500' },
      { bg: 'bg-indigo-500', text: 'text-indigo-400', border: 'border-indigo-500' },
      { bg: 'bg-cyan-500', text: 'text-cyan-400', border: 'border-cyan-500' }
    ][i % 10];

    const validateNumber = (v, min = 0) => !isNaN(parseFloat(v)) && parseFloat(v) >= min;

    const useLocalStorage = (key, init) => {
      const [val, setVal] = useState(() => { try { const i = localStorage.getItem(key); return i ? JSON.parse(i) : init; } catch { return init; } });
      const set = useCallback((v) => { try { const s = v instanceof Function ? v(val) : v; setVal(s); localStorage.setItem(key, JSON.stringify(s)); } catch {} }, [key, val]);
      return [val, set];
    };

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-2xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="sticky top-0 bg-slate-800 flex items-center justify-between p-6 border-b border-slate-700">
              <h2 className="text-xl font-bold text-white">{title}</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white p-2 rounded-lg">✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    };

    const QuickEditModal = ({ isOpen, onClose, cards, onUpdateBalances }) => {
      const [editedBalances, setEditedBalances] = useState({});
      const [charges, setCharges] = useState({});
      useEffect(() => {
        if (isOpen) {
          const b = {}, ch = {};
          cards.forEach(c => { b[c.id] = c.balance; ch[c.id] = ''; });
          setEditedBalances(b); setCharges(ch);
        }
      }, [isOpen, cards]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Update Balances">
          <div className="p-6 space-y-4">
            {cards.map(card => (
              <div key={card.id} className="bg-slate-900/50 rounded-xl p-4 border border-slate-700">
                <div className="font-semibold text-white mb-3">{card.name}</div>
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <div><label className="text-xs text-slate-400 block mb-1">Current</label><div className="text-slate-300">${parseFloat(card.balance).toFixed(2)}</div></div>
                  <div><label className="text-xs text-slate-400 block mb-1">New Balance</label><input type="number" value={editedBalances[card.id] || ''} onChange={e => setEditedBalances(p => ({ ...p, [card.id]: e.target.value }))} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white" step="0.01" /></div>
                </div>
                <div className="pt-3 border-t border-slate-700/50">
                  <label className="text-xs text-slate-400 block mb-2">Add Charge</label>
                  <div className="flex gap-2">
                    <input type="number" value={charges[card.id] || ''} onChange={e => setCharges(p => ({ ...p, [card.id]: e.target.value }))} placeholder="0.00" className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm" step="0.01" />
                    <button onClick={() => { const ch = parseFloat(charges[card.id]) || 0; if (ch > 0) { setEditedBalances(p => ({ ...p, [card.id]: (parseFloat(p[card.id] || 0) + ch).toFixed(2) })); setCharges(p => ({ ...p, [card.id]: '' })); }}} className="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-semibold text-sm">+ Add</button>
                  </div>
                </div>
              </div>
            ))}
            <div className="flex gap-3 mt-6">
              <button onClick={onClose} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold">Cancel</button>
              <button onClick={() => { onUpdateBalances(editedBalances); onClose(); }} className="flex-1 bg-gradient-to-r from-blue-600 to-cyan-600 text-white py-3 rounded-xl font-semibold">Save All</button>
            </div>
          </div>
        </Modal>
      );
    };

    const MakePaymentModal = ({ isOpen, onClose, cards, onMakePayment }) => {
      const [selectedCard, setSelectedCard] = useState('');
      const [paymentAmount, setPaymentAmount] = useState('');
      const selectedCardData = cards.find(c => c.id === selectedCard);
      const handlePayment = () => { if (selectedCard && paymentAmount && parseFloat(paymentAmount) > 0) { onMakePayment(selectedCard, parseFloat(paymentAmount)); setSelectedCard(''); setPaymentAmount(''); onClose(); }};
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Make a Payment">
          <div className="p-6 space-y-4">
            <div><label className="text-sm text-slate-300 mb-2 block">Select Card</label>
              <select value={selectedCard} onChange={e => setSelectedCard(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white">
                <option value="">Choose...</option>
                {cards.map(c => <option key={c.id} value={c.id}>{c.name} - ${parseFloat(c.balance).toFixed(2)}</option>)}
              </select>
            </div>
            {selectedCard && <div>
              <label className="text-sm text-slate-300 mb-2 block">Payment Amount</label>
              <input type="number" value={paymentAmount} onChange={e => setPaymentAmount(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white" placeholder="Enter amount" step="0.01" />
              {selectedCardData && <div className="text-xs text-slate-400 mt-2">Min: ${calculateMinPayment(selectedCardData.balance, selectedCardData.apr, selectedCardData.issuer)}</div>}
              {selectedCardData && <div className="flex gap-2 mt-2">
                <button onClick={() => setPaymentAmount(calculateMinPayment(selectedCardData.balance, selectedCardData.apr, selectedCardData.issuer))} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-xs font-semibold">Min Payment</button>
                <button onClick={() => setPaymentAmount(selectedCardData.balance)} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-xs font-semibold">Pay Full Balance</button>
              </div>}
            </div>}
            <button onClick={handlePayment} disabled={!selectedCard || !paymentAmount} className="w-full bg-gradient-to-r from-teal-600 to-cyan-600 disabled:from-slate-600 disabled:to-slate-600 text-white py-3 rounded-xl font-semibold">Record Payment</button>
          </div>
        </Modal>
      );
    };

    const PayoffCalculatorModal = ({ isOpen, onClose, cards, monthlyBudget, setMonthlyBudget, totalMinPayment }) => {
      const [budget, setBudget] = useState(monthlyBudget);
      useEffect(() => { setBudget(monthlyBudget); }, [monthlyBudget]);
      const timeline = useMemo(() => calculatePayoffTimeline(cards, parseFloat(budget) || 0), [cards, budget]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Payoff Calculator">
          <div className="p-6 space-y-6">
            <div>
              <label className="text-sm text-slate-300 mb-2 block">Monthly Payment Budget</label>
              <input type="number" value={budget} onChange={e => setBudget(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white" placeholder="Enter amount" />
              <div className="text-xs text-slate-400 mt-2">Min required: ${totalMinPayment.toFixed(2)}</div>
            </div>
            {timeline && <>
              <div className="bg-emerald-500/10 rounded-xl p-4 border border-emerald-500/30">
                <div className="font-semibold text-emerald-300 mb-1">🔥 Avalanche (Highest APR first)</div>
                <div className="grid grid-cols-2 gap-3 mt-3">
                  <div><div className="text-xs text-slate-400">Payoff Time</div><div className="text-2xl font-bold text-white">{Math.floor(timeline.avalanche.months / 12)}y {timeline.avalanche.months % 12}m</div></div>
                  <div><div className="text-xs text-slate-400">Total Interest</div><div className="text-2xl font-bold text-white">${timeline.avalanche.totalInterest.toFixed(2)}</div></div>
                </div>
              </div>
              <div className="bg-blue-500/10 rounded-xl p-4 border border-blue-500/30">
                <div className="font-semibold text-blue-300 mb-1">🎯 Snowball (Smallest balance first)</div>
                <div className="grid grid-cols-2 gap-3 mt-3">
                  <div><div className="text-xs text-slate-400">Payoff Time</div><div className="text-2xl font-bold text-white">{Math.floor(timeline.snowball.months / 12)}y {timeline.snowball.months % 12}m</div></div>
                  <div><div className="text-xs text-slate-400">Total Interest</div><div className="text-2xl font-bold text-white">${timeline.snowball.totalInterest.toFixed(2)}</div></div>
                </div>
              </div>
              <div className="bg-slate-900/50 rounded-xl p-4 border border-slate-700">
                <div className="text-sm font-semibold text-white mb-1">Recommendation</div>
                <div className="text-sm text-slate-300">{timeline.avalanche.totalInterest < timeline.snowball.totalInterest ? <><span className="text-emerald-400 font-semibold">Avalanche</span> saves ${(timeline.snowball.totalInterest - timeline.avalanche.totalInterest).toFixed(2)} in interest</> : <><span className="text-blue-400 font-semibold">Snowball</span> for quick motivational wins</>}</div>
              </div>
            </>}
            <button onClick={() => { setMonthlyBudget(budget); onClose(); }} className="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white py-3 rounded-xl font-semibold">Save Budget</button>
          </div>
        </Modal>
      );
    };

    const InsightsModal = ({ isOpen, onClose, cards, stats }) => {
      const highestAPR = cards.length ? cards.reduce((h, c) => parseFloat(c.apr) > parseFloat(h.apr) ? c : h) : null;
      const highestBalance = cards.length ? cards.reduce((h, c) => parseFloat(c.balance) > parseFloat(h.balance) ? c : h) : null;
      const today = new Date();
      const currentMonth = today.getMonth();
      const currentYear = today.getFullYear();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const firstDayOfMonth = new Date(currentYear, currentMonth, 1).getDay();
      const calendarDates = useMemo(() => { const d = []; for (let i = 0; i < firstDayOfMonth; i++) d.push(null); for (let i = 1; i <= daysInMonth; i++) d.push(i); return d; }, [currentMonth, currentYear]);
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const getEvents = (day) => {
        if (!day) return [];
        const ev = [];
        cards.forEach((card, idx) => {
          if (card.dueDate) { const d = new Date(card.dueDate); if (d.getMonth() === currentMonth && d.getFullYear() === currentYear && d.getDate() === day) ev.push({ type: 'due', card: card.name, color: getCardColor(idx) }); }
          if (card.closeDate) { const d = new Date(card.closeDate); if (d.getMonth() === currentMonth && d.getFullYear() === currentYear && d.getDate() === day) ev.push({ type: 'close', card: card.name, color: getCardColor(idx) }); }
        });
        return ev;
      };
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Insights">
          <div className="p-6 space-y-6">
            <div className="bg-slate-900/50 rounded-2xl p-5 border border-slate-700/50 space-y-3">
              <div className="flex justify-between"><span className="text-slate-400 text-sm">Total Debt</span><span className="text-white font-semibold">${stats.totalDebt.toFixed(2)}</span></div>
              <div className="flex justify-between"><span className="text-slate-400 text-sm">Monthly Interest</span><span className="text-amber-400 font-semibold">${stats.totalMonthlyInterest.toFixed(2)}</span></div>
              <div className="flex justify-between"><span className="text-slate-400 text-sm">Yearly Cost</span><span className="text-rose-400 font-semibold">${(stats.totalMonthlyInterest * 12).toFixed(2)}</span></div>
              <div className="flex justify-between"><span className="text-slate-400 text-sm">Credit Utilization</span><span className={`font-semibold ${stats.overallUtilization > 30 ? 'text-rose-400' : 'text-teal-400'}`}>{stats.overallUtilization.toFixed(1)}%</span></div>
            </div>
            {highestAPR && <div className="bg-rose-500/10 rounded-2xl p-5 border border-rose-500/20"><div className="text-rose-300 font-semibold mb-1">⚠️ Highest APR</div><div className="text-white font-semibold">{highestAPR.name}</div><div className="text-rose-400 text-3xl font-bold">{parseFloat(highestAPR.apr).toFixed(2)}%</div><div className="text-xs text-slate-400 mt-1">Priority target for payoff</div></div>}
            {highestBalance && <div className="bg-blue-500/10 rounded-2xl p-5 border border-blue-500/20"><div className="text-blue-300 font-semibold mb-1">💰 Largest Balance</div><div className="text-white font-semibold">{highestBalance.name}</div><div className="text-blue-400 text-3xl font-bold">${parseFloat(highestBalance.balance).toFixed(2)}</div></div>}
            <div className="bg-teal-500/10 rounded-2xl p-5 border border-teal-500/20">
              <div className="text-teal-300 font-semibold mb-3">💡 Financial Tips</div>
              <ul className="space-y-2 text-sm text-slate-300">
                <li>• Pay more than the minimum to reduce interest</li>
                <li>• Keep utilization below 30% on all cards</li>
                <li>• Consider balance transfers for high APR cards</li>
                <li>• Set up automatic payments to avoid late fees</li>
              </ul>
            </div>
            <div className="bg-slate-900/50 rounded-3xl p-6 border border-slate-700/30">
              <h3 className="text-xl font-semibold text-white mb-1">{monthNames[currentMonth]} {currentYear}</h3>
              <div className="grid grid-cols-7 gap-1 mt-4 mb-2">{['S','M','T','W','T','F','S'].map((d,i) => <div key={i} className="text-center text-xs text-slate-500">{d}</div>)}</div>
              <div className="grid grid-cols-7 gap-1">
                {calendarDates.map((day, idx) => {
                  const events = getEvents(day);
                  const isToday = day === today.getDate();
                  return <div key={idx} className="aspect-square flex flex-col items-center justify-center rounded-xl text-sm">
                    {day && <div className={`w-full h-full flex flex-col items-center justify-center rounded-xl ${isToday ? 'bg-cyan-500 text-white' : events.length ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>
                      <span>{day}</span>
                      {events.length > 0 && <div className="flex gap-0.5 mt-0.5">{events.map((e, i) => <div key={i} className={`w-1.5 h-1.5 rounded-full ${e.color.bg}`}></div>)}</div>}
                    </div>}
                  </div>;
                })}
              </div>
            </div>
            <button onClick={onClose} className="w-full bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold">Close</button>
          </div>
        </Modal>
      );
    };

    const HistoryModal = ({ isOpen, onClose, history }) => (
      <Modal isOpen={isOpen} onClose={onClose} title="Payment History">
        <div className="p-6">{history.length === 0 ? <div className="text-center py-8 text-slate-400">No payments yet</div> : <div className="space-y-3">{history.map(p => <div key={p.id} className="bg-slate-900/50 rounded-xl p-4 border border-slate-700"><div className="flex justify-between mb-1"><div className="font-semibold text-white">{p.cardName}</div><div className="text-emerald-400 font-bold">-${p.amount.toFixed(2)}</div></div><div className="text-sm text-slate-400">{new Date(p.date).toLocaleDateString()} • ${p.oldBalance.toFixed(2)} → ${p.newBalance.toFixed(2)}</div></div>)}</div>}</div>
      </Modal>
    );

    const FundsManagerModal = ({ isOpen, onClose, currentFunds, onUpdateFunds }) => {
      const [amount, setAmount] = useState('');
      const [add, setAdd] = useState('');
      useEffect(() => { if (isOpen) { setAmount(currentFunds); setAdd(''); } }, [isOpen, currentFunds]);
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
          <div className="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-6 border-b border-slate-700"><h2 className="text-xl font-bold text-white">Manage Funds</h2><button onClick={onClose} className="text-slate-400 hover:text-white p-2 rounded-lg">✕</button></div>
            <div className="p-6 space-y-4">
              <div><label className="text-sm text-slate-300 mb-2 block">Funds for Debt Payment</label><div className="text-xs text-slate-400 mb-2">Current: ${parseFloat(currentFunds).toFixed(2)}</div><input type="number" value={amount} onChange={e => setAmount(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white text-xl font-bold" step="0.01" placeholder="0.00" /></div>
              <div className="pt-4 border-t border-slate-700/50"><label className="text-sm text-teal-400 mb-2 block font-semibold">+ Add Funds</label><div className="flex gap-2"><input type="number" value={add} onChange={e => setAdd(e.target.value)} placeholder="Amount" className="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white" step="0.01" /><button onClick={() => { const a = parseFloat(add) || 0; if (a > 0) { setAmount(((parseFloat(amount) || 0) + a).toFixed(2)); setAdd(''); }}} className="bg-teal-600 hover:bg-teal-700 text-white px-4 py-3 rounded-lg font-semibold">+ Add</button></div></div>
              <div className="flex gap-3 mt-6"><button onClick={onClose} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold">Cancel</button><button onClick={() => { onUpdateFunds(amount); onClose(); }} className="flex-1 bg-gradient-to-r from-teal-600 to-cyan-600 text-white py-3 rounded-xl font-semibold">Save</button></div>
            </div>
          </div>
        </div>
      );
    };

    function DebtDash() {
      const [cards, setCards] = useLocalStorage('debt-cards', []);
      const [monthlyPaymentBudget, setMonthlyPaymentBudget] = useLocalStorage('monthly-payment-budget', '0');
      const [paymentHistory, setPaymentHistory] = useLocalStorage('payment-history', []);
      const [savingsGoal, setSavingsGoal] = useLocalStorage('savings-goal', '0');
      const [isAdding, setIsAdding] = useState(false);
      const [expandedCard, setExpandedCard] = useState(null);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
      const [showQuickEdit, setShowQuickEdit] = useState(false);
      const [showFundsManager, setShowFundsManager] = useState(false);
      const [showMakePayment, setShowMakePayment] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [showCalculator, setShowCalculator] = useState(false);
      const [showInsights, setShowInsights] = useState(false);
      const [notification, setNotification] = useState(null);
      const [newCard, setNewCard] = useState({ name: '', balance: '', creditLimit: '', apr: '', issuer: 'chase', dueDate: '', closeDate: '' });

      const showNotif = (msg, type = 'success') => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3000); };

      const stats = useMemo(() => {
        const totalDebt = cards.reduce((s, c) => s + (parseFloat(c.balance) || 0), 0);
        const totalMinPayment = cards.reduce((s, c) => s + parseFloat(calculateMinPayment(c.balance, c.apr, c.issuer || 'chase')), 0);
        const totalMonthlyInterest = cards.reduce((s, c) => s + (parseFloat(c.balance) || 0) * ((parseFloat(c.apr) || 0) / 100) / 12, 0);
        const totalCreditLimit = cards.reduce((s, c) => s + (parseFloat(c.creditLimit) || 0), 0);
        const overallUtilization = totalCreditLimit > 0 ? (totalDebt / totalCreditLimit) * 100 : 0;
        return { totalDebt, totalMinPayment, totalMonthlyInterest, totalCreditLimit, overallUtilization };
      }, [cards]);

      const handleUpdateBalances = (newBalances) => {
        const updated = cards.map(card => {
          const nb = parseFloat(newBalances[card.id]) || 0;
          const ob = parseFloat(card.balance) || 0;
          if (nb !== ob && nb < ob) setPaymentHistory(prev => [{ id: Date.now(), cardName: card.name, oldBalance: ob, newBalance: nb, amount: ob - nb, date: new Date().toISOString() }, ...prev]);
          return { ...card, balance: nb.toFixed(2) };
        });
        setCards(updated);
        showNotif('Balances updated!');
      };

      const handleMakePayment = (cardId, amount) => {
        const card = cards.find(c => c.id === cardId);
        if (!card) return;
        const ob = parseFloat(card.balance);
        const nb = Math.max(0, ob - amount);
        setCards(prev => prev.map(c => c.id === cardId ? { ...c, balance: nb.toFixed(2) } : c));
        setPaymentHistory(prev => [{ id: Date.now(), cardName: card.name, oldBalance: ob, newBalance: nb, amount, date: new Date().toISOString() }, ...prev]);
        showNotif(`Payment of $${amount.toFixed(2)} recorded!`);
      };

      const handleAddCard = () => {
        const { name, balance, apr, creditLimit, issuer, dueDate, closeDate } = newCard;
        if (!name.trim() || !validateNumber(balance, 0) || !validateNumber(apr, 0)) { showNotif('Please fill all required fields', 'error'); return; }
        setCards(prev => [...prev, { id: Date.now(), name: name.trim(), balance: parseFloat(balance).toFixed(2), creditLimit: creditLimit ? parseFloat(creditLimit).toFixed(2) : '0', apr: parseFloat(apr).toFixed(2), issuer, dueDate, closeDate }]);
        setNewCard({ name: '', balance: '', creditLimit: '', apr: '', issuer: 'chase', dueDate: '', closeDate: '' });
        setIsAdding(false);
        showNotif('Card added!');
      };

      const handleExport = () => {
        const data = JSON.stringify({ cards, monthlyPaymentBudget, paymentHistory, savingsGoal, exportDate: new Date().toISOString() }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `debt-dash-${new Date().toISOString().split('T')[0]}.json`;
        a.click(); URL.revokeObjectURL(url);
        showNotif('Backup downloaded!');
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.cards) setCards(data.cards);
            if (data.monthlyPaymentBudget) setMonthlyPaymentBudget(data.monthlyPaymentBudget);
            if (data.paymentHistory) setPaymentHistory(data.paymentHistory);
            if (data.savingsGoal) setSavingsGoal(data.savingsGoal);
            showNotif('Data restored!');
          } catch { showNotif('Invalid file', 'error'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950/20">
          {notification && (
            <div className={`fixed top-4 right-4 left-4 sm:left-auto z-50 px-6 py-3 rounded-xl shadow-2xl border ${notification.type === 'success' ? 'bg-emerald-500/90 border-emerald-400' : 'bg-rose-500/90 border-rose-400'} text-white font-medium`}>
              {notification.msg}
            </div>
          )}
          <QuickEditModal isOpen={showQuickEdit} onClose={() => setShowQuickEdit(false)} cards={cards} onUpdateBalances={handleUpdateBalances} />
          <FundsManagerModal isOpen={showFundsManager} onClose={() => setShowFundsManager(false)} currentFunds={savingsGoal} onUpdateFunds={(n) => { setSavingsGoal(n); showNotif('Funds updated!'); }} />
          <MakePaymentModal isOpen={showMakePayment} onClose={() => setShowMakePayment(false)} cards={cards} onMakePayment={handleMakePayment} />
          <PayoffCalculatorModal isOpen={showCalculator} onClose={() => setShowCalculator(false)} cards={cards} monthlyBudget={monthlyPaymentBudget} setMonthlyBudget={setMonthlyPaymentBudget} totalMinPayment={stats.totalMinPayment} />
          <InsightsModal isOpen={showInsights} onClose={() => setShowInsights(false)} cards={cards} stats={stats} />
          <HistoryModal isOpen={showHistory} onClose={() => setShowHistory(false)} history={paymentHistory} />

          <div className="bg-gradient-to-br from-blue-600 via-cyan-600 to-teal-600 px-6 pt-12 pb-32 shadow-2xl">
            <div className="flex items-center justify-between">
              <div><h1 className="text-white text-3xl font-bold">Debt Dash</h1><p className="text-blue-50/90 text-sm mt-1">Your path to financial freedom</p></div>
              <button onClick={() => setShowHistory(true)} className="bg-white/20 px-4 py-2.5 rounded-xl border border-white/30 text-white text-sm font-semibold hover:bg-white/30 transition-all">📋 History</button>
            </div>
          </div>

          <div className="max-w-2xl mx-auto px-4 -mt-24 pb-20">
            <div onClick={() => setShowQuickEdit(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 rounded-2xl shadow-2xl p-6 mb-6 border border-cyan-500/20 cursor-pointer hover:border-cyan-400/40 transition-all group">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3"><div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-600 flex items-center justify-center shadow-lg">📉</div><span className="text-slate-100 font-semibold">Total Debt</span></div>
                <span className="text-cyan-400 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✏️ Edit</span>
              </div>
              <div className="text-4xl font-bold text-white mb-2">${formatCurrency(stats.totalDebt)}</div>
              <div className="flex items-center justify-between mb-3"><div className="text-sm text-slate-400">{cards.length} card{cards.length !== 1 ? 's' : ''}</div><div className="text-sm text-cyan-400">Min: ${stats.totalMinPayment.toFixed(2)}</div></div>
              {parseFloat(savingsGoal) > 0 && <div className="pt-3 border-t border-slate-700/50"><div className="flex justify-between mb-1"><span className="text-slate-400 text-sm">Funds Ready</span><span className="text-teal-400 text-sm font-semibold">-${parseFloat(savingsGoal).toFixed(2)}</span></div><div className="flex justify-between"><span className="text-slate-300 text-sm font-semibold">What I Still Owe</span><span className={`text-lg font-bold ${(stats.totalDebt - parseFloat(savingsGoal)) > 0 ? 'text-amber-400' : 'text-teal-400'}`}>${Math.max(0, stats.totalDebt - parseFloat(savingsGoal)).toFixed(2)}</span></div></div>}
              {stats.totalMonthlyInterest > 0 && <div className="mt-4 pt-4 border-t border-slate-700/50 text-amber-400 text-sm">⚠️ ~${stats.totalMonthlyInterest.toFixed(2)}/mo interest</div>}
              {stats.overallUtilization > 0 && <div className="mt-3 pt-3 border-t border-slate-700/50"><div className="flex justify-between mb-2"><span className="text-slate-400 text-sm">Utilization</span><span className={`text-sm font-semibold ${stats.overallUtilization > 30 ? 'text-rose-400' : 'text-teal-400'}`}>{stats.overallUtilization.toFixed(1)}%</span></div><div className="w-full bg-slate-700/50 rounded-full h-2.5"><div className={`h-2.5 rounded-full ${stats.overallUtilization > 30 ? 'bg-gradient-to-r from-rose-500 to-orange-500' : 'bg-gradient-to-r from-teal-500 to-cyan-500'}`} style={{ width: `${Math.min(stats.overallUtilization, 100)}%` }} /></div></div>}
            </div>

            <div onClick={() => setShowFundsManager(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 rounded-2xl shadow-xl p-6 mb-6 border border-teal-500/20 hover:border-teal-400/30 transition-all cursor-pointer group">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3"><div className="w-12 h-12 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center justify-center shadow-lg">👛</div><div><span className="text-slate-100 font-semibold block">Funds Ready to Pay</span><span className="text-xs text-slate-400">Money set aside</span></div></div>
                <span className="text-teal-400 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✏️ Edit</span>
              </div>
              <div className="text-3xl font-bold text-white mb-4">${parseFloat(savingsGoal || 0).toFixed(2)}</div>
              <button onClick={e => { e.stopPropagation(); setShowMakePayment(true); }} className="w-full bg-gradient-to-r from-teal-600 to-cyan-600 hover:from-teal-700 hover:to-cyan-700 text-white py-4 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-lg transition-all">💵 Make a Payment</button>
            </div>

            <div className="grid grid-cols-2 gap-3 mb-6">
              <button onClick={() => setShowCalculator(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 text-white p-4 rounded-xl border border-blue-500/20 hover:border-blue-400/40 transition-all shadow-lg"><div className="flex items-center gap-2 mb-2"><span className="text-blue-400">🧮</span><span className="text-sm font-semibold">Calculator</span></div><div className="text-xs text-slate-400">Plan payoff</div></button>
              <button onClick={() => setShowInsights(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 text-white p-4 rounded-xl border border-cyan-500/20 hover:border-cyan-400/40 transition-all shadow-lg"><div className="flex items-center gap-2 mb-2"><span className="text-cyan-400">📊</span><span className="text-sm font-semibold">Insights</span></div><div className="text-xs text-slate-400">Analysis</div></button>
            </div>

            {isAdding && (
              <div className="bg-slate-800/90 rounded-2xl shadow-xl p-6 mb-6 border border-slate-700/50">
                <h3 className="font-bold text-white mb-5 text-lg">Add New Card</h3>
                <div className="space-y-4">
                  <input type="text" placeholder="Card Name" value={newCard.name} onChange={e => setNewCard(p => ({ ...p, name: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500" />
                  <select value={newCard.issuer} onChange={e => setNewCard(p => ({ ...p, issuer: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500">
                    <option value="chase">Chase</option><option value="navyfed">Navy Federal</option><option value="discover">Discover</option><option value="other">Other</option>
                  </select>
                  <input type="number" placeholder="Balance" value={newCard.balance} onChange={e => setNewCard(p => ({ ...p, balance: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500" step="0.01" />
                  <input type="number" placeholder="Credit Limit" value={newCard.creditLimit} onChange={e => setNewCard(p => ({ ...p, creditLimit: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500" step="0.01" />
                  <input type="number" placeholder="APR %" value={newCard.apr} onChange={e => setNewCard(p => ({ ...p, apr: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500" step="0.01" />
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-xs text-slate-400 mb-1 block">Payment Due Date</label><input type="date" value={newCard.dueDate} onChange={e => setNewCard(p => ({ ...p, dueDate: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500" /></div>
                    <div><label className="text-xs text-slate-400 mb-1 block">Statement Close Date</label><input type="date" value={newCard.closeDate} onChange={e => setNewCard(p => ({ ...p, closeDate: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500" /></div>
                  </div>
                  <div className="flex gap-3 pt-2">
                    <button onClick={handleAddCard} className="flex-1 bg-gradient-to-r from-cyan-600 to-teal-600 hover:from-cyan-700 hover:to-teal-700 text-white py-3 rounded-xl font-semibold transition-all">Add Card</button>
                    <button onClick={() => setIsAdding(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold transition-all">Cancel</button>
                  </div>
                </div>
              </div>
            )}

            {cards.length > 0 && (
              <div className="space-y-3 mb-6">
                {cards.map((card, i) => {
                  const minPayment = calculateMinPayment(card.balance, card.apr, card.issuer);
                  const monthlyInterest = (parseFloat(card.balance) || 0) * ((parseFloat(card.apr) || 0) / 100) / 12;
                  const creditLimit = parseFloat(card.creditLimit) || 0;
                  const cardBalance = parseFloat(card.balance) || 0;
                  const utilization = creditLimit > 0 ? (cardBalance / creditLimit) * 100 : 0;
                  const isExpanded = expandedCard === card.id;
                  const color = getCardColor(i);
                  return (
                    <div key={card.id} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 rounded-2xl shadow-xl overflow-hidden border border-cyan-500/15 hover:border-cyan-500/25 transition-all">
                      <div className="bg-slate-900/50 px-5 py-4 border-b border-slate-700/50">
                        <div className="flex items-center justify-between mb-2">
                          <div className="flex items-center gap-3 flex-1 min-w-0">
                            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500/20 to-cyan-500/20 flex items-center justify-center border border-cyan-500/30"><span className={`text-xl ${color.text}`}>{getCardSymbol(i)}</span></div>
                            <div className="flex-1 min-w-0"><div className="font-semibold text-slate-100 truncate">{card.name}</div><div className="text-slate-400 text-xs">{card.apr}% APR</div></div>
                          </div>
                          <button onClick={() => setExpandedCard(isExpanded ? null : card.id)} className="text-slate-400 hover:text-slate-300 p-2 rounded-lg">{isExpanded ? '▲' : '▼'}</button>
                        </div>
                        <div className="text-3xl font-bold text-white mb-2">${formatCurrency(cardBalance)}</div>
                        {utilization > 0 && creditLimit > 0 && <div className="mt-2"><div className="flex justify-between text-xs mb-1"><span className="text-slate-400">Using ${cardBalance.toFixed(2)} of ${creditLimit.toFixed(2)}</span><span className={`font-semibold ${utilization > 30 ? 'text-rose-400' : 'text-teal-400'}`}>{utilization.toFixed(1)}%</span></div><div className="w-full bg-slate-700/50 rounded-full h-1.5"><div className={`h-1.5 rounded-full ${utilization > 30 ? 'bg-gradient-to-r from-rose-500 to-orange-500' : 'bg-gradient-to-r from-teal-500 to-cyan-500'}`} style={{ width: `${Math.min(utilization, 100)}%` }} /></div></div>}
                      </div>
                      {isExpanded && (
                        <div className="p-5">
                          <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="bg-teal-500/10 rounded-xl p-4 border border-teal-500/20"><div className="text-xs text-teal-300 mb-1.5">Min Payment</div><div className="font-bold text-teal-100 text-lg">${minPayment}</div></div>
                            <div className="bg-amber-500/10 rounded-xl p-4 border border-amber-500/20"><div className="text-xs text-amber-300 mb-1.5">Monthly Interest</div><div className="font-bold text-amber-100 text-lg">${monthlyInterest.toFixed(2)}</div></div>
                          </div>
                          {creditLimit > 0 && <div className="mb-4 p-4 bg-slate-900/50 rounded-xl border border-slate-700/50"><div className="flex justify-between"><div><div className="text-xs text-slate-400 mb-1">Available</div><div className="text-2xl font-bold text-teal-400">${(creditLimit - cardBalance).toFixed(2)}</div></div><div className="text-right"><div className="text-xs text-slate-400 mb-1">Limit</div><div className="text-lg font-semibold text-slate-300">${creditLimit.toFixed(2)}</div></div></div></div>}
                          {showDeleteConfirm === card.id
                            ? <div className="flex gap-3"><button onClick={() => { setCards(prev => prev.filter(c => c.id !== card.id)); setShowDeleteConfirm(null); showNotif('Card removed'); }} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 rounded-xl">Confirm</button><button onClick={() => setShowDeleteConfirm(null)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl">Cancel</button></div>
                            : <button onClick={() => setShowDeleteConfirm(card.id)} className="text-sm text-rose-400 hover:text-rose-300 font-semibold py-2">Remove Card</button>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            <div className="pb-8">
              <div className="flex gap-3 mb-3">
                <button onClick={handleExport} className="flex-1 flex items-center justify-center gap-2 bg-slate-800/90 hover:bg-slate-700 text-slate-300 px-4 py-3 rounded-xl font-medium border border-slate-700/50 transition-colors">⬇️ Export</button>
                <label className="flex-1 flex items-center justify-center gap-2 bg-slate-800/90 hover:bg-slate-700 text-slate-300 px-4 py-3 rounded-xl font-medium border border-slate-700/50 cursor-pointer transition-colors">⬆️ Import<input type="file" accept=".json" onChange={handleImport} className="hidden" /></label>
              </div>
              {!isAdding && <button onClick={() => setIsAdding(true)} className="w-full bg-gradient-to-r from-cyan-600 to-teal-600 hover:from-cyan-700 hover:to-teal-700 text-white py-4 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-xl transition-all">➕ Add Credit Card</button>}
            </div>
            <div className="text-center pb-4 border-t border-slate-800/50 pt-4"><p className="text-slate-500 text-xs">Data saved locally • No servers • Complete privacy</p></div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DebtDash));
  </script>
</body>
</html>
