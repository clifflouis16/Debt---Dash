<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Dash</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #0f172a; }
    .animate-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, memo } = React;

    const formatCurrency = (amount) => (parseFloat(amount) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const calculateMinPayment = (balance, rate, issuer = 'chase') => {
      const b = parseFloat(balance) || 0;
      const r = parseFloat(rate) || 0;
      if (b === 0) return '0.00';
      const mi = b * (r / 100) / 12;
      if (issuer === 'chase') return Math.max(40, b * 0.01 + mi).toFixed(2);
      if (issuer === 'navyfed') { if (b < 20) return b.toFixed(2); return Math.max(20, Math.ceil(b * 0.01) + mi).toFixed(2); }
      if (issuer === 'discover') return Math.min(Math.max(35, b * 0.02, 20 + mi), b).toFixed(2);
      return Math.max(b * 0.02, 25).toFixed(2);
    };

    const calculatePayoffTimeline = (cards, monthlyPayment) => {
      if (!cards.length || monthlyPayment <= 0) return null;
      const sim = (sorted) => {
        let months = 0, totalInterest = 0;
        const c = sorted.map(x => ({ ...x }));
        while (c.some(x => x.balance > 0.01) && months < 600) {
          months++;
          let rem = monthlyPayment;
          c.forEach(x => { if (x.balance > 0) { const i = x.balance * (x.apr / 100) / 12; x.balance += i; totalInterest += i; } });
          c.forEach(x => { if (x.balance > 0 && rem > 0) { const p = Math.min(rem, x.balance); x.balance -= p; rem -= p; if (x.balance < 0.01) x.balance = 0; } });
        }
        return { months, totalInterest };
      };
      const base = cards.map(c => ({ balance: parseFloat(c.balance), apr: parseFloat(c.apr) }));
      return {
        avalanche: sim([...base].sort((a, b) => b.apr - a.apr)),
        snowball: sim([...base].sort((a, b) => a.balance - b.balance))
      };
    };

    const getCardSymbol = (i) => ['●', '■', '▲', '◆', '★', '♦', '▼', '◉', '◈', '◇'][i % 10];
    const getCardColor = (i) => [
      { bg: 'bg-red-500', text: 'text-red-400', border: 'border-red-500' },
      { bg: 'bg-blue-500', text: 'text-blue-400', border: 'border-blue-500' },
      { bg: 'bg-green-500', text: 'text-green-400', border: 'border-green-500' },
      { bg: 'bg-purple-500', text: 'text-purple-400', border: 'border-purple-500' },
      { bg: 'bg-yellow-500', text: 'text-yellow-400', border: 'border-yellow-500' },
      { bg: 'bg-pink-500', text: 'text-pink-400', border: 'border-pink-500' },
      { bg: 'bg-teal-500', text: 'text-teal-400', border: 'border-teal-500' },
      { bg: 'bg-orange-500', text: 'text-orange-400', border: 'border-orange-500' },
      { bg: 'bg-indigo-500', text: 'text-indigo-400', border: 'border-indigo-500' },
      { bg: 'bg-blue-400', text: 'text-blue-300', border: 'border-blue-400' }
    ][i % 10];

    const validateNumber = (v, min = 0) => !isNaN(parseFloat(v)) && parseFloat(v) >= min;

    const useLocalStorage = (key, init) => {
      const [val, setVal] = useState(() => { try { const i = localStorage.getItem(key); return i ? JSON.parse(i) : init; } catch { return init; } });
      const set = useCallback((v) => { try { const s = v instanceof Function ? v(val) : v; setVal(s); localStorage.setItem(key, JSON.stringify(s)); } catch {} }, [key, val]);
      return [val, set];
    };

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}} onClick={onClose}>
          <div style={{background:'#1e293b',borderRadius:'16px',border:'1px solid #334155',width:'100%',maxWidth:'640px',maxHeight:'90vh',overflowY:'auto'}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'24px',borderBottom:'1px solid #334155',position:'sticky',top:0,background:'#1e293b',zIndex:10}}>
              <h2 style={{color:'white',fontSize:'20px',fontWeight:'bold',margin:0}}>{title}</h2>
              <button onClick={onClose} style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontSize:'24px',padding:'4px'}}>✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    };

    const QuickEditModal = ({ isOpen, onClose, cards, onUpdateBalances }) => {
      const [editedBalances, setEditedBalances] = useState({});
      const [charges, setCharges] = useState({});
      useEffect(() => {
        if (isOpen) {
          const b = {}, ch = {};
          cards.forEach(c => { b[c.id] = c.balance; ch[c.id] = ''; });
          setEditedBalances(b); setCharges(ch);
        }
      }, [isOpen, cards]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Update Balances">
          <div style={{padding:'24px'}}>
            {cards.map(card => (
              <div key={card.id} style={{background:'#0f172a',borderRadius:'12px',padding:'16px',border:'1px solid #334155',marginBottom:'16px'}}>
                <div style={{color:'white',fontWeight:'600',marginBottom:'12px'}}>{card.name}</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'12px'}}>
                  <div><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>Current</div><div style={{color:'#cbd5e1'}}>${parseFloat(card.balance).toFixed(2)}</div></div>
                  <div><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>New Balance</div><input type="number" value={editedBalances[card.id] || ''} onChange={e => setEditedBalances(p => ({...p, [card.id]: e.target.value}))} style={{width:'100%',background:'#1e293b',border:'1px solid #475569',borderRadius:'8px',padding:'8px',color:'white',boxSizing:'border-box'}} step="0.01" /></div>
                </div>
                <div style={{borderTop:'1px solid #334155',paddingTop:'12px'}}>
                  <div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'8px'}}>Add Charge</div>
                  <div style={{display:'flex',gap:'8px'}}>
                    <input type="number" value={charges[card.id] || ''} onChange={e => setCharges(p => ({...p, [card.id]: e.target.value}))} placeholder="0.00" style={{flex:1,background:'#1e293b',border:'1px solid #475569',borderRadius:'8px',padding:'8px',color:'white'}} step="0.01" />
                    <button onClick={() => { const ch = parseFloat(charges[card.id]) || 0; if (ch > 0) { setEditedBalances(p => ({...p, [card.id]: (parseFloat(p[card.id]||0)+ch).toFixed(2)})); setCharges(p => ({...p,[card.id]:''})); }}} style={{background:'#d97706',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',cursor:'pointer',fontWeight:'600'}}>+ Add</button>
                  </div>
                </div>
              </div>
            ))}
            <div style={{display:'flex',gap:'12px',marginTop:'16px'}}>
              <button onClick={onClose} style={{flex:1,background:'#334155',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600'}}>Cancel</button>
              <button onClick={() => { onUpdateBalances(editedBalances); onClose(); }} style={{flex:1,background:'linear-gradient(to right, #2563eb, #0891b2)',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600'}}>Save All</button>
            </div>
          </div>
        </Modal>
      );
    };

    const FundsManagerModal = ({ isOpen, onClose, currentFunds, availableFunds, onUpdateFunds }) => {
      const [newSavings, setNewSavings] = useState('');
      const [newAvailable, setNewAvailable] = useState('');
      const [addS, setAddS] = useState('');
      const [addA, setAddA] = useState('');
      useEffect(() => { if (isOpen) { setNewSavings(currentFunds); setNewAvailable(availableFunds); setAddS(''); setAddA(''); } }, [isOpen]);
      if (!isOpen) return null;
      return (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
          <div style={{background:'#1e293b',borderRadius:'16px',border:'1px solid #334155',width:'100%',maxWidth:'480px'}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'24px',borderBottom:'1px solid #334155'}}>
              <h2 style={{color:'white',fontSize:'20px',fontWeight:'bold',margin:0}}>Manage Funds</h2>
              <button onClick={onClose} style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontSize:'20px'}}>✕</button>
            </div>
            <div style={{padding:'24px'}}>
              <div style={{marginBottom:'24px'}}>
                <div style={{color:'white',fontWeight:'600',marginBottom:'4px'}}>For Debt Payment</div>
                <div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'8px'}}>Current: ${parseFloat(currentFunds).toFixed(2)}</div>
                <input type="number" value={newSavings} onChange={e => setNewSavings(e.target.value)} style={{width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:'12px',padding:'12px',color:'white',fontSize:'20px',fontWeight:'bold',boxSizing:'border-box'}} step="0.01" placeholder="0.00" />
                <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
                  <input type="number" value={addS} onChange={e => setAddS(e.target.value)} placeholder="Add amount" style={{flex:1,background:'#0f172a',border:'1px solid #334155',borderRadius:'8px',padding:'10px',color:'white'}} step="0.01" />
                  <button onClick={() => { const a = parseFloat(addS)||0; if(a>0){setNewSavings(((parseFloat(newSavings)||0)+a).toFixed(2));setAddS('');} }} style={{background:'#2563eb',color:'white',border:'none',borderRadius:'8px',padding:'10px 16px',cursor:'pointer',fontWeight:'600'}}>+ Add</button>
                </div>
              </div>
              <div style={{marginBottom:'24px'}}>
                <div style={{color:'white',fontWeight:'600',marginBottom:'4px'}}>Total Available Funds</div>
                <div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'8px'}}>Current: ${parseFloat(availableFunds).toFixed(2)}</div>
                <input type="number" value={newAvailable} onChange={e => setNewAvailable(e.target.value)} style={{width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:'12px',padding:'12px',color:'white',fontSize:'20px',fontWeight:'bold',boxSizing:'border-box'}} step="0.01" placeholder="0.00" />
                <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
                  <input type="number" value={addA} onChange={e => setAddA(e.target.value)} placeholder="Add amount" style={{flex:1,background:'#0f172a',border:'1px solid #334155',borderRadius:'8px',padding:'10px',color:'white'}} step="0.01" />
                  <button onClick={() => { const a = parseFloat(addA)||0; if(a>0){setNewAvailable(((parseFloat(newAvailable)||0)+a).toFixed(2));setAddA('');} }} style={{background:'#0d9488',color:'white',border:'none',borderRadius:'8px',padding:'10px 16px',cursor:'pointer',fontWeight:'600'}}>+ Add</button>
                </div>
              </div>
              <div style={{background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:'12px',padding:'16px',display:'flex',justifyContent:'space-between',marginBottom:'24px'}}>
                <span style={{color:'#6ee7b7',fontWeight:'600'}}>Free to Spend</span>
                <span style={{color:'#34d399',fontWeight:'bold',fontSize:'18px'}}>${Math.max(0,(parseFloat(newAvailable)||0)-(parseFloat(newSavings)||0)).toFixed(2)}</span>
              </div>
              <div style={{display:'flex',gap:'12px'}}>
                <button onClick={onClose} style={{flex:1,background:'#334155',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600'}}>Cancel</button>
                <button onClick={() => { onUpdateFunds(newSavings, newAvailable); onClose(); }} style={{flex:1,background:'linear-gradient(to right, #0d9488, #0891b2)',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600'}}>Save Changes</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const MakePaymentModal = ({ isOpen, onClose, cards, onMakePayment }) => {
      const [selectedCard, setSelectedCard] = useState('');
      const [paymentAmount, setPaymentAmount] = useState('');
      const selectedCardData = cards.find(c => c.id === selectedCard);
      const handlePayment = () => { if (selectedCard && paymentAmount && parseFloat(paymentAmount) > 0) { onMakePayment(selectedCard, parseFloat(paymentAmount)); setSelectedCard(''); setPaymentAmount(''); onClose(); } };
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Make a Payment">
          <div style={{padding:'24px'}}>
            <div style={{marginBottom:'16px'}}>
              <div style={{color:'#cbd5e1',fontSize:'14px',marginBottom:'8px'}}>Select Card</div>
              <select value={selectedCard} onChange={e => setSelectedCard(e.target.value)} style={{width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:'12px',padding:'12px',color:'white'}}>
                <option value="">Choose...</option>
                {cards.map(c => <option key={c.id} value={c.id}>{c.name} - ${parseFloat(c.balance).toFixed(2)}</option>)}
              </select>
            </div>
            {selectedCard && (
              <div style={{marginBottom:'16px'}}>
                <div style={{color:'#cbd5e1',fontSize:'14px',marginBottom:'8px'}}>Payment Amount</div>
                <input type="number" value={paymentAmount} onChange={e => setPaymentAmount(e.target.value)} style={{width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:'12px',padding:'12px',color:'white',boxSizing:'border-box'}} placeholder="Enter amount" step="0.01" />
                {selectedCardData && <div style={{color:'#94a3b8',fontSize:'12px',marginTop:'8px'}}>Min: ${calculateMinPayment(selectedCardData.balance, selectedCardData.apr, selectedCardData.issuer)}</div>}
                {selectedCardData && <div style={{display:'flex',gap:'8px',marginTop:'8px'}}>
                  <button onClick={() => setPaymentAmount(calculateMinPayment(selectedCardData.balance, selectedCardData.apr, selectedCardData.issuer))} style={{flex:1,background:'#334155',color:'white',border:'none',borderRadius:'8px',padding:'8px',cursor:'pointer',fontSize:'12px',fontWeight:'600'}}>Min Payment</button>
                  <button onClick={() => setPaymentAmount(selectedCardData.balance)} style={{flex:1,background:'#059669',color:'white',border:'none',borderRadius:'8px',padding:'8px',cursor:'pointer',fontSize:'12px',fontWeight:'600'}}>Pay Full Balance</button>
                </div>}
              </div>
            )}
            <button onClick={handlePayment} disabled={!selectedCard || !paymentAmount} style={{width:'100%',background:(!selectedCard||!paymentAmount)?'#334155':'linear-gradient(to right, #0d9488, #0891b2)',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:(!selectedCard||!paymentAmount)?'not-allowed':'pointer',fontWeight:'600'}}>Record Payment</button>
          </div>
        </Modal>
      );
    };

    const PayoffCalculatorModal = ({ isOpen, onClose, cards, monthlyBudget, setMonthlyBudget, totalMinPayment }) => {
      const [budget, setBudget] = useState(monthlyBudget);
      useEffect(() => { setBudget(monthlyBudget); }, [monthlyBudget]);
      const timeline = useMemo(() => calculatePayoffTimeline(cards, parseFloat(budget) || 0), [cards, budget]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Payoff Calculator">
          <div style={{padding:'24px'}}>
            <div style={{marginBottom:'24px'}}>
              <div style={{color:'#cbd5e1',fontSize:'14px',marginBottom:'8px'}}>Monthly Payment Budget</div>
              <input type="number" value={budget} onChange={e => setBudget(e.target.value)} style={{width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:'12px',padding:'12px',color:'white',boxSizing:'border-box'}} placeholder="Enter amount" />
              <div style={{color:'#94a3b8',fontSize:'12px',marginTop:'8px'}}>Min required: ${totalMinPayment.toFixed(2)}</div>
            </div>
            {timeline && <>
              <div style={{background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:'12px',padding:'16px',marginBottom:'16px'}}>
                <div style={{color:'#6ee7b7',fontWeight:'600',marginBottom:'4px'}}>🔥 Avalanche — Highest APR first</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'12px'}}>
                  <div><div style={{color:'#94a3b8',fontSize:'12px'}}>Payoff Time</div><div style={{color:'white',fontSize:'24px',fontWeight:'bold'}}>{Math.floor(timeline.avalanche.months/12)}y {timeline.avalanche.months%12}m</div></div>
                  <div><div style={{color:'#94a3b8',fontSize:'12px'}}>Total Interest</div><div style={{color:'white',fontSize:'24px',fontWeight:'bold'}}>${timeline.avalanche.totalInterest.toFixed(2)}</div></div>
                </div>
              </div>
              <div style={{background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:'12px',padding:'16px',marginBottom:'16px'}}>
                <div style={{color:'#93c5fd',fontWeight:'600',marginBottom:'4px'}}>🎯 Snowball — Smallest balance first</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'12px'}}>
                  <div><div style={{color:'#94a3b8',fontSize:'12px'}}>Payoff Time</div><div style={{color:'white',fontSize:'24px',fontWeight:'bold'}}>{Math.floor(timeline.snowball.months/12)}y {timeline.snowball.months%12}m</div></div>
                  <div><div style={{color:'#94a3b8',fontSize:'12px'}}>Total Interest</div><div style={{color:'white',fontSize:'24px',fontWeight:'bold'}}>${timeline.snowball.totalInterest.toFixed(2)}</div></div>
                </div>
              </div>
              <div style={{background:'#0f172a',border:'1px solid #334155',borderRadius:'12px',padding:'16px',marginBottom:'16px'}}>
                <div style={{color:'white',fontWeight:'600',marginBottom:'8px'}}>Recommendation</div>
                <div style={{color:'#cbd5e1',fontSize:'14px'}}>{timeline.avalanche.totalInterest < timeline.snowball.totalInterest ? <span><span style={{color:'#34d399',fontWeight:'600'}}>Avalanche</span> saves ${(timeline.snowball.totalInterest - timeline.avalanche.totalInterest).toFixed(2)} in interest</span> : <span><span style={{color:'#60a5fa',fontWeight:'600'}}>Snowball</span> for quick motivational wins</span>}</div>
              </div>
            </>}
            <button onClick={() => { setMonthlyBudget(budget); onClose(); }} style={{width:'100%',background:'linear-gradient(to right, #2563eb, #0891b2)',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600'}}>Save Budget</button>
          </div>
        </Modal>
      );
    };

    const InsightsModal = ({ isOpen, onClose, cards, stats }) => {
      const highestAPR = cards.length ? cards.reduce((h,c) => parseFloat(c.apr)>parseFloat(h.apr)?c:h) : null;
      const highestBalance = cards.length ? cards.reduce((h,c) => parseFloat(c.balance)>parseFloat(h.balance)?c:h) : null;
      const today = new Date();
      const currentMonth = today.getMonth();
      const currentYear = today.getFullYear();
      const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
      const firstDayOfMonth = new Date(currentYear, currentMonth, 1).getDay();
      const calendarDates = useMemo(() => { const d=[]; for(let i=0;i<firstDayOfMonth;i++) d.push(null); for(let i=1;i<=daysInMonth;i++) d.push(i); return d; }, [currentMonth,currentYear]);
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const getEvents = (day) => {
        if (!day) return [];
        const ev = [];
        cards.forEach((card,idx) => {
          if (card.dueDate) { const d=new Date(card.dueDate); if(d.getMonth()===currentMonth&&d.getFullYear()===currentYear&&d.getDate()===day) ev.push({type:'due',card:card.name,color:getCardColor(idx)}); }
          if (card.closeDate) { const d=new Date(card.closeDate); if(d.getMonth()===currentMonth&&d.getFullYear()===currentYear&&d.getDate()===day) ev.push({type:'close',card:card.name,color:getCardColor(idx)}); }
        });
        return ev;
      };
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Insights">
          <div style={{padding:'24px'}}>
            <div style={{background:'#0f172a',borderRadius:'16px',padding:'20px',border:'1px solid #334155',marginBottom:'16px'}}>
              {[['Total Debt',`$${stats.totalDebt.toFixed(2)}`,'white'],['Monthly Interest',`$${stats.totalMonthlyInterest.toFixed(2)}`,'#fbbf24'],['Yearly Cost',`$${(stats.totalMonthlyInterest*12).toFixed(2)}`,'#f87171'],['Credit Utilization',`${stats.overallUtilization.toFixed(1)}%`,stats.overallUtilization>30?'#f87171':'#2dd4bf']].map(([label,val,color]) => (
                <div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                  <span style={{color:'#94a3b8',fontSize:'14px'}}>{label}</span>
                  <span style={{color,fontWeight:'600',fontSize:'18px'}}>{val}</span>
                </div>
              ))}
            </div>
            {highestAPR && <div style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'16px',padding:'20px',marginBottom:'16px'}}><div style={{color:'#fca5a5',fontWeight:'600',marginBottom:'8px'}}>⚠️ Highest APR</div><div style={{color:'white',fontWeight:'600'}}>{highestAPR.name}</div><div style={{color:'#f87171',fontSize:'30px',fontWeight:'bold'}}>{parseFloat(highestAPR.apr).toFixed(2)}%</div><div style={{color:'#94a3b8',fontSize:'12px',marginTop:'8px'}}>Priority target for payoff</div></div>}
            {highestBalance && <div style={{background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:'16px',padding:'20px',marginBottom:'16px'}}><div style={{color:'#93c5fd',fontWeight:'600',marginBottom:'8px'}}>💰 Largest Balance</div><div style={{color:'white',fontWeight:'600'}}>{highestBalance.name}</div><div style={{color:'#60a5fa',fontSize:'30px',fontWeight:'bold'}}>${parseFloat(highestBalance.balance).toFixed(2)}</div></div>}
            <div style={{background:'rgba(20,184,166,0.1)',border:'1px solid rgba(20,184,166,0.2)',borderRadius:'16px',padding:'20px',marginBottom:'16px'}}>
              <div style={{color:'#5eead4',fontWeight:'600',marginBottom:'12px'}}>💡 Financial Tips</div>
              {['Pay more than the minimum to reduce interest','Keep utilization below 30% on all cards','Consider balance transfers for high APR cards','Set up automatic payments to avoid fees'].map(tip => <div key={tip} style={{color:'#cbd5e1',fontSize:'14px',marginBottom:'8px'}}>• {tip}</div>)}
            </div>
            <div style={{background:'#0f172a',borderRadius:'24px',padding:'24px',border:'1px solid #334155',marginBottom:'16px'}}>
              <div style={{color:'white',fontSize:'22px',fontWeight:'600',marginBottom:'4px'}}>{monthNames[currentMonth]} {currentYear}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginTop:'16px',marginBottom:'8px'}}>
                {['S','M','T','W','T','F','S'].map((d,i) => <div key={i} style={{textAlign:'center',color:'#64748b',fontSize:'12px',paddingBottom:'8px'}}>{d}</div>)}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px'}}>
                {calendarDates.map((day,idx) => {
                  const events = getEvents(day);
                  const isToday = day === today.getDate();
                  return (
                    <div key={idx} style={{aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',borderRadius:'10px',background:isToday?'#06b6d4':events.length?'#1e293b':'transparent',cursor:'default'}}>
                      {day && <>
                        <span style={{color:isToday?'white':events.length?'white':'#94a3b8',fontSize:'13px'}}>{day}</span>
                        {events.length > 0 && <div style={{display:'flex',gap:'2px',marginTop:'2px'}}>{events.map((e,i) => <div key={i} style={{width:'6px',height:'6px',borderRadius:'50%',background:e.type==='due'?'#ef4444':'#3b82f6'}}></div>)}</div>}
                      </>}
                    </div>
                  );
                })}
              </div>
            </div>
            <button onClick={onClose} style={{width:'100%',background:'#334155',color:'white',border:'1px solid #475569',borderRadius:'16px',padding:'16px',cursor:'pointer',fontWeight:'600'}}>Close</button>
          </div>
        </Modal>
      );
    };

    const HistoryModal = ({ isOpen, onClose, history }) => (
      <Modal isOpen={isOpen} onClose={onClose} title="Payment History">
        <div style={{padding:'24px'}}>
          {history.length === 0 ? <div style={{textAlign:'center',color:'#94a3b8',padding:'32px'}}>No payments yet</div> :
            history.map(p => (
              <div key={p.id} style={{background:'#0f172a',borderRadius:'12px',padding:'16px',border:'1px solid #334155',marginBottom:'12px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}>
                  <div style={{color:'white',fontWeight:'600'}}>{p.cardName}</div>
                  <div style={{color:'#34d399',fontWeight:'bold'}}>-${p.amount.toFixed(2)}</div>
                </div>
                <div style={{color:'#94a3b8',fontSize:'14px'}}>{new Date(p.date).toLocaleDateString()} • ${p.oldBalance.toFixed(2)} → ${p.newBalance.toFixed(2)}</div>
              </div>
            ))
          }
        </div>
      </Modal>
    );

    function DebtDash() {
      const [cards, setCards] = useLocalStorage('debt-cards', []);
      const [monthlyPaymentBudget, setMonthlyPaymentBudget] = useLocalStorage('monthly-payment-budget', '0');
      const [paymentHistory, setPaymentHistory] = useLocalStorage('payment-history', []);
      const [savingsGoal, setSavingsGoal] = useLocalStorage('savings-goal', '0');
      const [availableFunds, setAvailableFunds] = useLocalStorage('available-funds', '0');
      const [isAdding, setIsAdding] = useState(false);
      const [expandedCard, setExpandedCard] = useState(null);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
      const [showQuickEdit, setShowQuickEdit] = useState(false);
      const [showFundsManager, setShowFundsManager] = useState(false);
      const [showMakePayment, setShowMakePayment] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [showCalculator, setShowCalculator] = useState(false);
      const [showInsights, setShowInsights] = useState(false);
      const [notification, setNotification] = useState(null);
      const [newCard, setNewCard] = useState({ name:'', balance:'', creditLimit:'', apr:'', issuer:'chase', dueDate:'', closeDate:'' });

      const showNotif = (msg, type='success') => { setNotification({msg,type}); setTimeout(()=>setNotification(null),3000); };

      const stats = useMemo(() => {
        const totalDebt = cards.reduce((s,c) => s+(parseFloat(c.balance)||0), 0);
        const totalMinPayment = cards.reduce((s,c) => s+parseFloat(calculateMinPayment(c.balance,c.apr,c.issuer||'chase')), 0);
        const totalMonthlyInterest = cards.reduce((s,c) => s+(parseFloat(c.balance)||0)*((parseFloat(c.apr)||0)/100)/12, 0);
        const totalCreditLimit = cards.reduce((s,c) => s+(parseFloat(c.creditLimit)||0), 0);
        const overallUtilization = totalCreditLimit>0?(totalDebt/totalCreditLimit)*100:0;
        return { totalDebt, totalMinPayment, totalMonthlyInterest, totalCreditLimit, overallUtilization };
      }, [cards]);

      const handleUpdateBalances = (newBalances) => {
        const updated = cards.map(card => {
          const nb = parseFloat(newBalances[card.id])||0, ob = parseFloat(card.balance)||0;
          if (nb!==ob&&nb<ob) setPaymentHistory(prev=>[{id:Date.now(),cardName:card.name,oldBalance:ob,newBalance:nb,amount:ob-nb,date:new Date().toISOString()},...prev]);
          return {...card,balance:nb.toFixed(2)};
        });
        setCards(updated); showNotif('Balances updated!');
      };

      const handleMakePayment = (cardId, amount) => {
        const card = cards.find(c=>c.id===cardId); if(!card) return;
        const ob=parseFloat(card.balance), nb=Math.max(0,ob-amount);
        setCards(prev=>prev.map(c=>c.id===cardId?{...c,balance:nb.toFixed(2)}:c));
        setPaymentHistory(prev=>[{id:Date.now(),cardName:card.name,oldBalance:ob,newBalance:nb,amount,date:new Date().toISOString()},...prev]);
        showNotif(`Payment of $${amount.toFixed(2)} recorded!`);
      };

      const handleAddCard = () => {
        const {name,balance,apr,creditLimit,issuer,dueDate,closeDate} = newCard;
        if (!name.trim()||!validateNumber(balance,0)||!validateNumber(apr,0)) { showNotif('Please fill all required fields','error'); return; }
        setCards(prev=>[...prev,{id:Date.now(),name:name.trim(),balance:parseFloat(balance).toFixed(2),creditLimit:creditLimit?parseFloat(creditLimit).toFixed(2):'0',apr:parseFloat(apr).toFixed(2),issuer,dueDate,closeDate}]);
        setNewCard({name:'',balance:'',creditLimit:'',apr:'',issuer:'chase',dueDate:'',closeDate:''});
        setIsAdding(false); showNotif('Card added!');
      };

      const handleExport = () => {
        const data = JSON.stringify({cards,monthlyPaymentBudget,paymentHistory,savingsGoal,availableFunds,exportDate:new Date().toISOString()},null,2);
        const blob = new Blob([data],{type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href=url; a.download=`debt-dash-${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(url);
        showNotif('Backup downloaded!');
      };

      const handleImport = (e) => {
        const file=e.target.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=(ev)=>{
          try {
            const data=JSON.parse(ev.target.result);
            if(data.cards) setCards(data.cards);
            if(data.monthlyPaymentBudget) setMonthlyPaymentBudget(data.monthlyPaymentBudget);
            if(data.paymentHistory) setPaymentHistory(data.paymentHistory);
            if(data.savingsGoal) setSavingsGoal(data.savingsGoal);
            if(data.availableFunds) setAvailableFunds(data.availableFunds);
            showNotif('Data restored!');
          } catch { showNotif('Invalid file','error'); }
        };
        reader.readAsText(file); e.target.value='';
      };

      const inputStyle = {width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:'12px',padding:'12px',color:'white',boxSizing:'border-box',fontSize:'16px'};
      const cardStyle = {background:'linear-gradient(135deg, #0f172a, #1e293b)',borderRadius:'16px',boxShadow:'0 4px 24px rgba(0,0,0,0.4)',overflow:'hidden',border:'1px solid rgba(6,182,212,0.15)',marginBottom:'12px'};

      return (
        <div style={{minHeight:'100vh',background:'linear-gradient(135deg, #020617, #0f172a, #0c1a2e)'}}>
          {notification && (
            <div style={{position:'fixed',top:'16px',right:'16px',left:'16px',zIndex:100,padding:'12px 24px',borderRadius:'12px',border:`1px solid ${notification.type==='success'?'#34d399':'#f87171'}`,background:notification.type==='success'?'rgba(16,185,129,0.9)':'rgba(239,68,68,0.9)',color:'white',fontWeight:'600',maxWidth:'400px',marginLeft:'auto'}}>
              {notification.msg}
            </div>
          )}

          <QuickEditModal isOpen={showQuickEdit} onClose={()=>setShowQuickEdit(false)} cards={cards} onUpdateBalances={handleUpdateBalances} />
          <FundsManagerModal isOpen={showFundsManager} onClose={()=>setShowFundsManager(false)} currentFunds={savingsGoal} availableFunds={availableFunds} onUpdateFunds={(ns,na)=>{setSavingsGoal(ns);setAvailableFunds(na);showNotif('Funds updated!');}} />
          <MakePaymentModal isOpen={showMakePayment} onClose={()=>setShowMakePayment(false)} cards={cards} onMakePayment={handleMakePayment} />
          <PayoffCalculatorModal isOpen={showCalculator} onClose={()=>setShowCalculator(false)} cards={cards} monthlyBudget={monthlyPaymentBudget} setMonthlyBudget={setMonthlyPaymentBudget} totalMinPayment={stats.totalMinPayment} />
          <InsightsModal isOpen={showInsights} onClose={()=>setShowInsights(false)} cards={cards} stats={stats} />
          <HistoryModal isOpen={showHistory} onClose={()=>setShowHistory(false)} history={paymentHistory} />

          <div style={{background:'linear-gradient(135deg, #2563eb, #0891b2, #0d9488)',padding:'48px 24px 120px',boxShadow:'0 4px 32px rgba(0,0,0,0.4)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',maxWidth:'640px',margin:'0 auto'}}>
              <div><h1 style={{color:'white',fontSize:'30px',fontWeight:'bold',margin:0}}>Debt Dash</h1><p style={{color:'rgba(255,255,255,0.8)',fontSize:'14px',margin:'4px 0 0'}}>Your path to financial freedom</p></div>
              <button onClick={()=>setShowHistory(true)} style={{background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.3)',borderRadius:'12px',padding:'10px 16px',color:'white',cursor:'pointer',fontWeight:'600',fontSize:'14px'}}>📋 History</button>
            </div>
          </div>

          <div style={{maxWidth:'640px',margin:'-96px auto 0',padding:'0 16px 80px'}}>
            <div onClick={()=>setShowQuickEdit(true)} style={{...cardStyle,marginBottom:'16px',cursor:'pointer',border:'1px solid rgba(6,182,212,0.2)'}}>
              <div style={{padding:'24px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                    <div style={{width:'48px',height:'48px',borderRadius:'12px',background:'linear-gradient(135deg,#2563eb,#0891b2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px'}}>📉</div>
                    <span style={{color:'#f1f5f9',fontWeight:'600'}}>Total Debt</span>
                  </div>
                  <span style={{color:'#22d3ee',fontSize:'12px'}}>✏️ Edit</span>
                </div>
                <div style={{color:'white',fontSize:'40px',fontWeight:'bold',marginBottom:'8px'}}>${formatCurrency(stats.totalDebt)}</div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}>
                  <span style={{color:'#94a3b8',fontSize:'14px'}}>{cards.length} card{cards.length!==1?'s':''}</span>
                  <span style={{color:'#22d3ee',fontSize:'14px'}}>Min: ${stats.totalMinPayment.toFixed(2)}</span>
                </div>
                {parseFloat(savingsGoal)>0 && <div style={{borderTop:'1px solid #334155',paddingTop:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{color:'#94a3b8',fontSize:'14px'}}>Funds Ready</span><span style={{color:'#2dd4bf',fontSize:'14px',fontWeight:'600'}}>-${parseFloat(savingsGoal).toFixed(2)}</span></div>
                  <div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:'#e2e8f0',fontSize:'14px',fontWeight:'600'}}>What I Still Owe</span><span style={{color:(stats.totalDebt-parseFloat(savingsGoal))>0?'#fbbf24':'#2dd4bf',fontSize:'18px',fontWeight:'bold'}}>${Math.max(0,stats.totalDebt-parseFloat(savingsGoal)).toFixed(2)}</span></div>
                </div>}
                {stats.totalMonthlyInterest>0 && <div style={{borderTop:'1px solid #334155',paddingTop:'12px',marginTop:'12px',color:'#fbbf24',fontSize:'14px'}}>⚠️ ~${stats.totalMonthlyInterest.toFixed(2)}/mo interest • ${(stats.totalMonthlyInterest*12).toFixed(2)}/yr</div>}
                {stats.overallUtilization>0 && <div style={{borderTop:'1px solid #334155',paddingTop:'12px',marginTop:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{color:'#94a3b8',fontSize:'14px'}}>Utilization</span><span style={{color:stats.overallUtilization>30?'#f87171':'#2dd4bf',fontSize:'14px',fontWeight:'600'}}>{stats.overallUtilization.toFixed(1)}%</span></div>
                  <div style={{background:'#334155',borderRadius:'99px',height:'10px'}}><div style={{height:'10px',borderRadius:'99px',background:stats.overallUtilization>30?'linear-gradient(to right,#ef4444,#f97316)':'linear-gradient(to right,#14b8a6,#06b6d4)',width:`${Math.min(stats.overallUtilization,100)}%`}}></div></div>
                </div>}
              </div>
            </div>

            <div onClick={()=>setShowFundsManager(true)} style={{...cardStyle,marginBottom:'16px',cursor:'pointer',border:'1px solid rgba(20,184,166,0.2)'}}>
              <div style={{padding:'24px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                    <div style={{width:'48px',height:'48px',borderRadius:'12px',background:'linear-gradient(135deg,#0d9488,#0891b2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px'}}>👛</div>
                    <div><div style={{color:'#f1f5f9',fontWeight:'600'}}>Account Balance</div><div style={{color:'#94a3b8',fontSize:'12px'}}>Track your funds</div></div>
                  </div>
                  <span style={{color:'#2dd4bf',fontSize:'12px'}}>✏️ Edit</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
                  <div><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>For Debt Payment</div><div style={{color:'white',fontSize:'24px',fontWeight:'bold'}}>${parseFloat(savingsGoal||0).toFixed(2)}</div></div>
                  <div><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>Total Available</div><div style={{color:'white',fontSize:'24px',fontWeight:'bold'}}>${parseFloat(availableFunds||0).toFixed(2)}</div></div>
                </div>
                {parseFloat(availableFunds||0)>0 && <div style={{borderTop:'1px solid #334155',paddingTop:'16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{color:'#94a3b8',fontSize:'14px'}}>Free to Spend</span><span style={{color:(parseFloat(availableFunds||0)-parseFloat(savingsGoal||0))>=0?'#34d399':'#f87171',fontSize:'18px',fontWeight:'bold'}}>${Math.max(0,parseFloat(availableFunds||0)-parseFloat(savingsGoal||0)).toFixed(2)}</span></div>
                  {parseFloat(savingsGoal||0)>0 && <button onClick={e=>{e.stopPropagation();setShowMakePayment(true);}} style={{width:'100%',background:'linear-gradient(to right,#0d9488,#0891b2)',color:'white',border:'none',borderRadius:'12px',padding:'14px',cursor:'pointer',fontWeight:'600',fontSize:'16px'}}>💵 Make a Payment</button>}
                </div>}
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'24px'}}>
              <button onClick={()=>setShowCalculator(true)} style={{background:'linear-gradient(135deg,#0f172a,#1e293b)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:'12px',padding:'16px',cursor:'pointer',textAlign:'left'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}><span style={{color:'#60a5fa',fontSize:'18px'}}>🧮</span><span style={{color:'#f1f5f9',fontWeight:'600',fontSize:'14px'}}>Calculator</span></div>
                <div style={{color:'#94a3b8',fontSize:'12px'}}>Plan payoff</div>
              </button>
              <button onClick={()=>setShowInsights(true)} style={{background:'linear-gradient(135deg,#0f172a,#1e293b)',border:'1px solid rgba(6,182,212,0.2)',borderRadius:'12px',padding:'16px',cursor:'pointer',textAlign:'left'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}><span style={{color:'#22d3ee',fontSize:'18px'}}>📊</span><span style={{color:'#f1f5f9',fontWeight:'600',fontSize:'14px'}}>Insights</span></div>
                <div style={{color:'#94a3b8',fontSize:'12px'}}>Analysis</div>
              </button>
            </div>

            {isAdding && (
              <div style={{background:'#1e293b',borderRadius:'16px',padding:'24px',border:'1px solid #334155',marginBottom:'16px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
                  <h3 style={{color:'white',fontWeight:'bold',fontSize:'18px',margin:0}}>Add New Card</h3>
                  <button onClick={()=>setIsAdding(false)} style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontSize:'20px'}}>✕</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                  <input type="text" placeholder="Card Name (e.g., Chase Freedom)" value={newCard.name} onChange={e=>setNewCard(p=>({...p,name:e.target.value}))} style={inputStyle} />
                  <select value={newCard.issuer} onChange={e=>setNewCard(p=>({...p,issuer:e.target.value}))} style={inputStyle}>
                    <option value="chase">Chase</option><option value="navyfed">Navy Federal</option><option value="discover">Discover</option><option value="other">Other</option>
                  </select>
                  <input type="number" placeholder="Current Balance" value={newCard.balance} onChange={e=>setNewCard(p=>({...p,balance:e.target.value}))} style={inputStyle} step="0.01" />
                  <input type="number" placeholder="Credit Limit" value={newCard.creditLimit} onChange={e=>setNewCard(p=>({...p,creditLimit:e.target.value}))} style={inputStyle} step="0.01" />
                  <input type="number" placeholder="APR % (e.g., 18.99)" value={newCard.apr} onChange={e=>setNewCard(p=>({...p,apr:e.target.value}))} style={inputStyle} step="0.01" />
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                    <div><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>Payment Due Date</div><input type="date" value={newCard.dueDate} onChange={e=>setNewCard(p=>({...p,dueDate:e.target.value}))} style={inputStyle} /></div>
                    <div><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>Statement Close Date</div><input type="date" value={newCard.closeDate} onChange={e=>setNewCard(p=>({...p,closeDate:e.target.value}))} style={inputStyle} /></div>
                  </div>
                  <div style={{display:'flex',gap:'12px',marginTop:'8px'}}>
                    <button onClick={handleAddCard} style={{flex:1,background:'linear-gradient(to right,#0891b2,#0d9488)',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600',fontSize:'16px'}}>Add Card</button>
                    <button onClick={()=>setIsAdding(false)} style={{flex:1,background:'#334155',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600',fontSize:'16px'}}>Cancel</button>
                  </div>
                </div>
              </div>
            )}

            {cards.length===0 && !isAdding && (
              <div style={{background:'rgba(15,23,42,0.5)',borderRadius:'16px',padding:'48px 24px',border:'1px solid #334155',textAlign:'center',marginBottom:'16px'}}>
                <div style={{fontSize:'64px',marginBottom:'16px'}}>💳</div>
                <h3 style={{color:'white',fontSize:'20px',fontWeight:'bold',marginBottom:'8px'}}>Start Your Debt Journey</h3>
                <p style={{color:'#94a3b8',marginBottom:'24px'}}>Add your first credit card to begin tracking</p>
                <button onClick={()=>setIsAdding(true)} style={{background:'linear-gradient(to right,#2563eb,#0891b2)',color:'white',border:'none',borderRadius:'12px',padding:'12px 24px',cursor:'pointer',fontWeight:'600',fontSize:'16px'}}>➕ Add Your First Card</button>
              </div>
            )}

            {cards.map((card,i) => {
              const minPayment = calculateMinPayment(card.balance,card.apr,card.issuer);
              const monthlyInterest = (parseFloat(card.balance)||0)*((parseFloat(card.apr)||0)/100)/12;
              const creditLimit = parseFloat(card.creditLimit)||0;
              const cardBalance = parseFloat(card.balance)||0;
              const utilization = creditLimit>0?(cardBalance/creditLimit)*100:0;
              const isExpanded = expandedCard===card.id;
              const color = getCardColor(i);
              let minPayoffMonths = '';
              if (cardBalance>0) {
                let bal=cardBalance, months=0, rate=(parseFloat(card.apr)||0)/100/12, minPay=parseFloat(minPayment);
                while(bal>0.01&&months<600){const int=bal*rate;bal+=int;const p=Math.min(minPay,bal);bal-=p;months++;}
                const yrs=Math.floor(months/12),rem=months%12;
                minPayoffMonths = yrs>0?`${yrs}y ${rem}m`:`${rem}m`;
              }
              return (
                <div key={card.id} style={cardStyle}>
                  <div style={{background:'rgba(15,23,42,0.5)',padding:'20px',borderBottom:'1px solid #334155'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'12px',flex:1,minWidth:0}}>
                        <div style={{width:'40px',height:'40px',borderRadius:'10px',background:'rgba(59,130,246,0.2)',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid rgba(6,182,212,0.3)',flexShrink:0}}>
                          <span style={{fontSize:'20px'}} className={color.text}>{getCardSymbol(i)}</span>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{color:'#f1f5f9',fontWeight:'600',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{card.name}</div>
                          <div style={{color:'#94a3b8',fontSize:'12px'}}>{card.apr}% APR</div>
                        </div>
                      </div>
                      <button onClick={()=>setExpandedCard(isExpanded?null:card.id)} style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontSize:'16px',padding:'4px',flexShrink:0}}>{isExpanded?'▲':'▼'}</button>
                    </div>
                    <div style={{color:'white',fontSize:'32px',fontWeight:'bold',marginBottom:'8px'}}>${formatCurrency(cardBalance)}</div>
                    {utilization>0&&creditLimit>0 && <div>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'4px'}}>
                        <span style={{color:'#94a3b8'}}>Using ${cardBalance.toFixed(2)} of ${creditLimit.toFixed(2)}</span>
                        <span style={{color:utilization>30?'#f87171':'#2dd4bf',fontWeight:'600'}}>{utilization.toFixed(1)}%</span>
                      </div>
                      <div style={{background:'#334155',borderRadius:'99px',height:'6px'}}><div style={{height:'6px',borderRadius:'99px',background:utilization>30?'linear-gradient(to right,#ef4444,#f97316)':'linear-gradient(to right,#14b8a6,#06b6d4)',width:`${Math.min(utilization,100)}%`}}></div></div>
                    </div>}
                  </div>
                  {isExpanded && (
                    <div style={{padding:'20px'}}>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'12px'}}>
                        <div style={{background:'rgba(20,184,166,0.1)',borderRadius:'12px',padding:'16px',border:'1px solid rgba(20,184,166,0.2)'}}><div style={{color:'#5eead4',fontSize:'12px',marginBottom:'6px'}}>Min Payment</div><div style={{color:'white',fontWeight:'bold',fontSize:'18px'}}>${minPayment}</div></div>
                        <div style={{background:'rgba(251,191,36,0.1)',borderRadius:'12px',padding:'16px',border:'1px solid rgba(251,191,36,0.2)'}}><div style={{color:'#fcd34d',fontSize:'12px',marginBottom:'6px'}}>Monthly Interest</div><div style={{color:'white',fontWeight:'bold',fontSize:'18px'}}>${monthlyInterest.toFixed(2)}</div></div>
                      </div>
                      {minPayoffMonths && <div style={{background:'rgba(59,130,246,0.1)',borderRadius:'12px',padding:'16px',border:'1px solid rgba(59,130,246,0.2)',marginBottom:'12px'}}><div style={{color:'#93c5fd',fontSize:'12px',marginBottom:'6px'}}>If Paid Minimum Only</div><div style={{color:'white',fontWeight:'bold',fontSize:'18px'}}>{minPayoffMonths}</div></div>}
                      {creditLimit>0 && <div style={{background:'rgba(15,23,42,0.5)',borderRadius:'12px',padding:'16px',border:'1px solid #334155',marginBottom:'12px'}}><div style={{display:'flex',justifyContent:'space-between'}}><div><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>Available</div><div style={{color:'#2dd4bf',fontSize:'24px',fontWeight:'bold'}}>${(creditLimit-cardBalance).toFixed(2)}</div></div><div style={{textAlign:'right'}}><div style={{color:'#94a3b8',fontSize:'12px',marginBottom:'4px'}}>Limit</div><div style={{color:'#e2e8f0',fontSize:'18px',fontWeight:'600'}}>${creditLimit.toFixed(2)}</div></div></div></div>}
                      {showDeleteConfirm===card.id
                        ? <div style={{display:'flex',gap:'12px'}}>
                            <button onClick={()=>{setCards(prev=>prev.filter(c=>c.id!==card.id));setShowDeleteConfirm(null);showNotif('Card removed');}} style={{flex:1,background:'#dc2626',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600'}}>Confirm Delete</button>
                            <button onClick={()=>setShowDeleteConfirm(null)} style={{flex:1,background:'#334155',color:'white',border:'none',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'600'}}>Cancel</button>
                          </div>
                        : <button onClick={()=>setShowDeleteConfirm(card.id)} style={{color:'#f87171',background:'none',border:'none',cursor:'pointer',fontWeight:'600',fontSize:'14px',padding:'8px 0'}}>Remove Card</button>
                      }
                    </div>
                  )}
                </div>
              );
            })}

            <div style={{paddingBottom:'32px',marginTop:'8px'}}>
              <div style={{display:'flex',gap:'12px',marginBottom:'12px'}}>
                <button onClick={handleExport} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',background:'rgba(30,41,59,0.9)',color:'#cbd5e1',border:'1px solid #334155',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'500'}}>⬇️ Export</button>
                <label style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',background:'rgba(30,41,59,0.9)',color:'#cbd5e1',border:'1px solid #334155',borderRadius:'12px',padding:'12px',cursor:'pointer',fontWeight:'500'}}>
                  ⬆️ Import<input type="file" accept=".json" onChange={handleImport} style={{display:'none'}} />
                </label>
              </div>
              {!isAdding && <button onClick={()=>setIsAdding(true)} style={{width:'100%',background:'linear-gradient(to right,#0891b2,#0d9488)',color:'white',border:'none',borderRadius:'12px',padding:'16px',cursor:'pointer',fontWeight:'600',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',boxShadow:'0 4px 24px rgba(8,145,178,0.3)'}}>➕ Add Credit Card</button>}
            </div>
            <div style={{textAlign:'center',paddingBottom:'16px',borderTop:'1px solid rgba(51,65,85,0.5)',paddingTop:'16px'}}>
              <p style={{color:'#475569',fontSize:'12px',margin:0}}>Data saved locally • No servers • Complete privacy</p>
              <p style={{color:'#334155',fontSize:'12px',margin:'4px 0 0'}}>Debt Dash v2.2</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DebtDash));
  </script>
</body>
</html>
