<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Dash - Your Path to Financial Freedom</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .animate-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, memo } = React;
    const { Plus, TrendingDown, Wallet, ChevronDown, ChevronUp, Download, Upload, DollarSign, AlertCircle, Target, Zap, History, Calculator, BarChart3, Flame, X, Edit2 } = lucide;

    const formatCurrency = (amount) => {
      const num = parseFloat(amount) || 0;
      return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const calculateMinPayment = (balance, rate, issuer = 'chase') => {
      const balanceNum = parseFloat(balance) || 0;
      const aprNum = parseFloat(rate) || 0;
      if (balanceNum === 0) return '0.00';
      const monthlyInterestRate = (aprNum / 100) / 12;
      const monthlyInterest = balanceNum * monthlyInterestRate;
      if (issuer === 'chase') { const percentagePlusInterest = (balanceNum * 0.01) + monthlyInterest; return Math.max(40, percentagePlusInterest).toFixed(2); }
      if (issuer === 'navyfed') { if (balanceNum < 20) return balanceNum.toFixed(2); const onePercent = Math.ceil(balanceNum * 0.01); return Math.max(20, onePercent + monthlyInterest).toFixed(2); }
      if (issuer === 'discover') { const twoPercent = balanceNum * 0.02; return Math.min(Math.max(35, twoPercent), balanceNum).toFixed(2); }
      return Math.max(balanceNum * 0.02, 25).toFixed(2);
    };

    const calculatePayoffTimeline = (cards, monthlyPayment) => {
      if (!cards.length || monthlyPayment <= 0) return null;
      const simulatePayoff = (sortedCards) => {
        let months = 0, totalInterest = 0;
        const cardsClone = sortedCards.map(c => ({ ...c }));
        while (cardsClone.some(c => c.balance > 0.01) && months < 600) {
          months++;
          let remainingPayment = monthlyPayment;
          for (let card of cardsClone) { if (card.balance > 0) { const interest = card.balance * (card.apr / 100) / 12; card.balance += interest; totalInterest += interest; } }
          for (let card of cardsClone) { if (card.balance > 0 && remainingPayment > 0) { const payment = Math.min(remainingPayment, card.balance); card.balance -= payment; remainingPayment -= payment; if (card.balance < 0.01) card.balance = 0; } }
          if (remainingPayment === monthlyPayment) break;
        }
        return { months, totalInterest };
      };
      return {
        avalanche: simulatePayoff(cards.map(c => ({ balance: parseFloat(c.balance), apr: parseFloat(c.apr) })).sort((a, b) => b.apr - a.apr)),
        snowball: simulatePayoff(cards.map(c => ({ balance: parseFloat(c.balance), apr: parseFloat(c.apr) })).sort((a, b) => a.balance - b.balance))
      };
    };

    const getCardSymbol = (index) => ['●', '■', '▲', '◆', '★', '♦', '▼', '◉', '◈', '◇'][index % 10];
    const getCardColor = (index) => {
      const colors = [
        { bg: 'bg-rose-500', text: 'text-rose-400', border: 'border-rose-500', glow: 'shadow-rose-500' },
        { bg: 'bg-blue-500', text: 'text-blue-400', border: 'border-blue-500', glow: 'shadow-blue-500' },
        { bg: 'bg-emerald-500', text: 'text-emerald-400', border: 'border-emerald-500', glow: 'shadow-emerald-500' },
        { bg: 'bg-purple-500', text: 'text-purple-400', border: 'border-purple-500', glow: 'shadow-purple-500' },
        { bg: 'bg-amber-500', text: 'text-amber-400', border: 'border-amber-500', glow: 'shadow-amber-500' },
        { bg: 'bg-pink-500', text: 'text-pink-400', border: 'border-pink-500', glow: 'shadow-pink-500' },
        { bg: 'bg-teal-500', text: 'text-teal-400', border: 'border-teal-500', glow: 'shadow-teal-500' },
        { bg: 'bg-orange-500', text: 'text-orange-400', border: 'border-orange-500', glow: 'shadow-orange-500' },
        { bg: 'bg-indigo-500', text: 'text-indigo-400', border: 'border-indigo-500', glow: 'shadow-indigo-500' },
        { bg: 'bg-cyan-500', text: 'text-cyan-400', border: 'border-cyan-500', glow: 'shadow-cyan-500' }
      ];
      return colors[index % colors.length];
    };

    const validateNumber = (value, min = 0) => { const num = parseFloat(value); return !isNaN(num) && num >= min; };

    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try { const item = window.localStorage.getItem(key); return item ? JSON.parse(item) : initialValue; } catch { return initialValue; }
      });
      const setValue = useCallback((value) => {
        try { const valueToStore = value instanceof Function ? value(storedValue) : value; setStoredValue(valueToStore); window.localStorage.setItem(key, JSON.stringify(valueToStore)); } catch (error) { console.error(`Error saving ${key}:`, error); }
      }, [key, storedValue]);
      return [storedValue, setValue];
    };

    const Icon = ({ name, size = 24, className = "" }) => {
      useEffect(() => { lucide.createIcons(); }, []);
      return React.createElement('i', { 'data-lucide': name, className: className, style: { width: size, height: size, display: 'inline-block' } });
    };

    const Notification = memo(({ message, type }) => (
      <div className={`fixed top-4 right-4 left-4 sm:left-auto z-50 px-6 py-3 rounded-xl shadow-2xl border backdrop-blur-md animate-in ${type === 'success' ? 'bg-emerald-500/90 border-emerald-400 text-white' : 'bg-rose-500/90 border-rose-400 text-white'}`}>
        <div className="flex items-center gap-2 font-medium">{message}</div>
      </div>
    ));

    const Modal = memo(({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-0" onClick={onClose}>
          <div className="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 w-full h-full sm:w-auto sm:h-auto sm:max-w-2xl sm:max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            <div className="sticky top-0 bg-slate-800 z-10 flex items-center justify-between p-4 sm:p-6 border-b border-slate-700">
              <h2 className="text-lg sm:text-xl font-bold text-white">{title}</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white p-2 rounded-lg transition-colors">✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    });

    const QuickEditModal = memo(({ isOpen, onClose, cards, onUpdateBalances }) => {
      const [editedBalances, setEditedBalances] = useState({});
      const [charges, setCharges] = useState({});
      useEffect(() => {
        if (isOpen) {
          const balances = {}, newCharges = {};
          cards.forEach(card => { balances[card.id] = card.balance; newCharges[card.id] = ''; });
          setEditedBalances(balances); setCharges(newCharges);
        }
      }, [isOpen, cards]);
      const handleAddCharge = useCallback((cardId) => {
        const charge = parseFloat(charges[cardId]) || 0;
        if (charge > 0) { setEditedBalances(prev => ({ ...prev, [cardId]: (parseFloat(prev[cardId] || 0) + charge).toFixed(2) })); setCharges(prev => ({ ...prev, [cardId]: '' })); }
      }, [charges, editedBalances]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Update Balances">
          <div className="p-4 sm:p-6">
            <div className="space-y-4">
              {cards.map((card) => (
                <div key={card.id} className="bg-slate-900/50 rounded-xl p-4 border border-slate-700">
                  <div className="font-semibold text-white mb-3">{card.name}</div>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <div><label className="text-xs text-slate-400 block mb-1">Current</label><div className="text-slate-300">${parseFloat(card.balance).toFixed(2)}</div></div>
                    <div><label className="text-xs text-slate-400 block mb-1">New Balance</label><input type="number" value={editedBalances[card.id] || ''} onChange={(e) => setEditedBalances(prev => ({ ...prev, [card.id]: e.target.value }))} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white" step="0.01" /></div>
                  </div>
                  <div className="pt-3 border-t border-slate-700/50">
                    <label className="text-xs text-slate-400 block mb-2">Add Charge</label>
                    <div className="flex gap-2">
                      <input type="number" value={charges[card.id] || ''} onChange={(e) => setCharges(prev => ({ ...prev, [card.id]: e.target.value }))} placeholder="0.00" className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm" step="0.01" />
                      <button onClick={() => handleAddCharge(card.id)} className="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-semibold text-sm">+ Add</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="flex gap-3 mt-6">
              <button onClick={onClose} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold">Cancel</button>
              <button onClick={() => { onUpdateBalances(editedBalances); onClose(); }} className="flex-1 bg-gradient-to-r from-blue-600 to-cyan-600 text-white py-3 rounded-xl font-semibold">Save All</button>
            </div>
          </div>
        </Modal>
      );
    });

    const FundsManagerModal = memo(({ isOpen, onClose, currentFunds, availableFunds, onUpdateFunds }) => {
      const [newSavings, setNewSavings] = useState('');
      const [newAvailable, setNewAvailable] = useState('');
      const [addSavings, setAddSavings] = useState('');
      const [addAvailable, setAddAvailable] = useState('');
      useEffect(() => { if (isOpen) { setNewSavings(currentFunds); setNewAvailable(availableFunds); setAddSavings(''); setAddAvailable(''); } }, [isOpen, currentFunds, availableFunds]);
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between p-6 border-b border-slate-700">
              <h2 className="text-xl font-bold text-white">Manage Account Balance</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white p-2 rounded-lg">✕</button>
            </div>
            <div className="p-6 space-y-6">
              <div>
                <label className="text-sm text-slate-300 mb-1 block font-semibold">For Debt Payment</label>
                <div className="text-xs text-slate-400 mb-2">Current: ${parseFloat(currentFunds).toFixed(2)}</div>
                <input type="number" value={newSavings} onChange={(e) => setNewSavings(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white text-xl font-bold" step="0.01" placeholder="0.00" />
                <div className="flex gap-2 mt-2"><input type="number" value={addSavings} onChange={(e) => setAddSavings(e.target.value)} placeholder="Add amount" className="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg px-3 py-2 text-white" step="0.01" /><button onClick={() => { const a = parseFloat(addSavings) || 0; if (a > 0) { setNewSavings(((parseFloat(newSavings) || 0) + a).toFixed(2)); setAddSavings(''); }}} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold text-sm">+ Add</button></div>
              </div>
              <div>
                <label className="text-sm text-slate-300 mb-1 block font-semibold">Total Available Funds</label>
                <div className="text-xs text-slate-400 mb-2">Current: ${parseFloat(availableFunds).toFixed(2)}</div>
                <input type="number" value={newAvailable} onChange={(e) => setNewAvailable(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white text-xl font-bold" step="0.01" placeholder="0.00" />
                <div className="flex gap-2 mt-2"><input type="number" value={addAvailable} onChange={(e) => setAddAvailable(e.target.value)} placeholder="Add amount" className="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg px-3 py-2 text-white" step="0.01" /><button onClick={() => { const a = parseFloat(addAvailable) || 0; if (a > 0) { setNewAvailable(((parseFloat(newAvailable) || 0) + a).toFixed(2)); setAddAvailable(''); }}} className="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg font-semibold text-sm">+ Add</button></div>
              </div>
              <div className="p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-xl flex items-center justify-between">
                <span className="text-sm text-emerald-300 font-semibold">Free to Spend</span>
                <span className="text-lg font-bold text-emerald-400">${Math.max(0, (parseFloat(newAvailable) || 0) - (parseFloat(newSavings) || 0)).toFixed(2)}</span>
              </div>
              <div className="flex gap-3">
                <button onClick={onClose} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold">Cancel</button>
                <button onClick={() => { onUpdateFunds(newSavings, newAvailable); onClose(); }} className="flex-1 bg-gradient-to-r from-teal-600 to-cyan-600 text-white py-3 rounded-xl font-semibold">Save Changes</button>
              </div>
            </div>
          </div>
        </div>
      );
    });

    const MakePaymentModal = memo(({ isOpen, onClose, cards, onMakePayment }) => {
      const [selectedCard, setSelectedCard] = useState('');
      const [paymentAmount, setPaymentAmount] = useState('');
      const selectedCardData = useMemo(() => cards.find(c => c.id === selectedCard), [cards, selectedCard]);
      const handlePayment = useCallback(() => {
        if (selectedCard && paymentAmount && parseFloat(paymentAmount) > 0) { onMakePayment(selectedCard, parseFloat(paymentAmount)); setSelectedCard(''); setPaymentAmount(''); onClose(); }
      }, [selectedCard, paymentAmount, onMakePayment, onClose]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Make a Payment">
          <div className="p-6 space-y-4">
            <div><label className="text-sm text-slate-300 mb-2 block">Select Card</label>
              <select value={selectedCard} onChange={(e) => setSelectedCard(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white">
                <option value="">Choose...</option>
                {cards.map(card => <option key={card.id} value={card.id}>{card.name} - ${parseFloat(card.balance).toFixed(2)}</option>)}
              </select>
            </div>
            {selectedCard && (
              <div>
                <label className="text-sm text-slate-300 mb-2 block">Payment Amount</label>
                <input type="number" value={paymentAmount} onChange={(e) => setPaymentAmount(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white" placeholder="Enter amount" step="0.01" />
                {selectedCardData && <div className="text-xs text-slate-400 mt-2">Min: ${calculateMinPayment(selectedCardData.balance, selectedCardData.apr, selectedCardData.issuer)}</div>}
                {selectedCardData && <div className="flex gap-2 mt-2">
                  <button onClick={() => setPaymentAmount(calculateMinPayment(selectedCardData.balance, selectedCardData.apr, selectedCardData.issuer))} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-xs font-semibold">Min Payment</button>
                  <button onClick={() => setPaymentAmount(selectedCardData.balance)} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-xs font-semibold">Pay Full Balance</button>
                </div>}
              </div>
            )}
            <button onClick={handlePayment} disabled={!selectedCard || !paymentAmount} className="w-full bg-gradient-to-r from-teal-600 to-cyan-600 disabled:from-slate-600 disabled:to-slate-600 disabled:cursor-not-allowed text-white py-3 rounded-xl font-semibold">Record Payment</button>
          </div>
        </Modal>
      );
    });

    const PayoffCalculatorModal = memo(({ isOpen, onClose, cards, monthlyBudget, setMonthlyBudget, totalMinPayment }) => {
      const [calculatorBudget, setCalculatorBudget] = useState(monthlyBudget);
      useEffect(() => { setCalculatorBudget(monthlyBudget); }, [monthlyBudget]);
      const timeline = useMemo(() => calculatePayoffTimeline(cards, parseFloat(calculatorBudget) || 0), [cards, calculatorBudget]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Payoff Calculator">
          <div className="p-6 space-y-6">
            <div>
              <label className="text-sm text-slate-300 mb-2 block">Monthly Payment Budget</label>
              <input type="number" value={calculatorBudget} onChange={(e) => setCalculatorBudget(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white" placeholder="Enter amount" />
              <div className="text-xs text-slate-400 mt-2">Min required: ${totalMinPayment.toFixed(2)}</div>
            </div>
            {timeline && (
              <div className="space-y-4">
                <div className="bg-emerald-500/10 rounded-xl p-4 border border-emerald-500/30">
                  <div className="font-semibold text-emerald-300 mb-1">🔥 Avalanche — Highest APR first</div>
                  <div className="grid grid-cols-2 gap-3 mt-2">
                    <div><div className="text-xs text-slate-400">Payoff Time</div><div className="text-2xl font-bold text-white">{Math.floor(timeline.avalanche.months / 12)}y {timeline.avalanche.months % 12}m</div></div>
                    <div><div className="text-xs text-slate-400">Total Interest</div><div className="text-2xl font-bold text-white">${timeline.avalanche.totalInterest.toFixed(2)}</div></div>
                  </div>
                </div>
                <div className="bg-blue-500/10 rounded-xl p-4 border border-blue-500/30">
                  <div className="font-semibold text-blue-300 mb-1">🎯 Snowball — Smallest balance first</div>
                  <div className="grid grid-cols-2 gap-3 mt-2">
                    <div><div className="text-xs text-slate-400">Payoff Time</div><div className="text-2xl font-bold text-white">{Math.floor(timeline.snowball.months / 12)}y {timeline.snowball.months % 12}m</div></div>
                    <div><div className="text-xs text-slate-400">Total Interest</div><div className="text-2xl font-bold text-white">${timeline.snowball.totalInterest.toFixed(2)}</div></div>
                  </div>
                </div>
                <div className="bg-slate-900/50 rounded-xl p-4 border border-slate-700">
                  <div className="text-sm font-semibold text-white mb-1">Recommendation</div>
                  <div className="text-sm text-slate-300">{timeline.avalanche.totalInterest < timeline.snowball.totalInterest ? <><span className="text-emerald-400 font-semibold">Avalanche</span> saves ${(timeline.snowball.totalInterest - timeline.avalanche.totalInterest).toFixed(2)}</> : <><span className="text-blue-400 font-semibold">Snowball</span> for quick wins</>}</div>
                </div>
              </div>
            )}
            <button onClick={() => { setMonthlyBudget(calculatorBudget); onClose(); }} className="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white py-3 rounded-xl font-semibold">Save Budget</button>
          </div>
        </Modal>
      );
    });

    const InsightsModal = memo(({ isOpen, onClose, cards, stats }) => {
      const highestAPR = useMemo(() => cards.length ? cards.reduce((h, c) => (parseFloat(c.apr) > parseFloat(h.apr) ? c : h)) : null, [cards]);
      const highestBalance = useMemo(() => cards.length ? cards.reduce((h, c) => (parseFloat(c.balance) > parseFloat(h.balance) ? c : h)) : null, [cards]);
      const highestUtil = useMemo(() => cards.length ? cards.reduce((h, c) => { const util = parseFloat(c.creditLimit) > 0 ? (parseFloat(c.balance) / parseFloat(c.creditLimit)) * 100 : 0; const hUtil = parseFloat(h.creditLimit) > 0 ? (parseFloat(h.balance) / parseFloat(h.creditLimit)) * 100 : 0; return util > hUtil ? c : h; }) : null, [cards]);
      const today = new Date();
      const currentMonth = today.getMonth();
      const currentYear = today.getFullYear();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const firstDayOfMonth = new Date(currentYear, currentMonth, 1).getDay();
      const calendarDates = useMemo(() => { const dates = []; for (let i = 0; i < firstDayOfMonth; i++) dates.push(null); for (let i = 1; i <= daysInMonth; i++) dates.push(i); return dates; }, [firstDayOfMonth, daysInMonth]);
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const getEventsForDay = useCallback((day) => {
        if (!day) return [];
        const events = [];
        cards.forEach((card, idx) => {
          if (card.dueDate) { const d = new Date(card.dueDate); if (d.getMonth() === currentMonth && d.getFullYear() === currentYear && d.getDate() === day) events.push({ type: 'due', card: card.name, color: getCardColor(idx) }); }
          if (card.closeDate) { const d = new Date(card.closeDate); if (d.getMonth() === currentMonth && d.getFullYear() === currentYear && d.getDate() === day) events.push({ type: 'close', card: card.name, color: getCardColor(idx) }); }
        });
        return events;
      }, [cards, currentMonth, currentYear]);
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Insights">
          <div className="p-4 sm:p-6 space-y-6">
            <div className="bg-slate-900/50 rounded-2xl p-5 border border-slate-700/50 space-y-3">
              <div className="flex justify-between items-center"><span className="text-slate-400 text-sm">Total Debt</span><span className="text-white font-semibold text-lg">${stats.totalDebt.toFixed(2)}</span></div>
              <div className="flex justify-between items-center"><span className="text-slate-400 text-sm">Monthly Interest</span><span className="text-amber-400 font-semibold text-lg">${stats.totalMonthlyInterest.toFixed(2)}</span></div>
              <div className="flex justify-between items-center"><span className="text-slate-400 text-sm">Yearly Cost</span><span className="text-rose-400 font-semibold text-lg">${(stats.totalMonthlyInterest * 12).toFixed(2)}</span></div>
              <div className="flex justify-between items-center"><span className="text-slate-400 text-sm">Credit Utilization</span><span className={`font-semibold text-lg ${stats.overallUtilization > 30 ? 'text-rose-400' : 'text-teal-400'}`}>{stats.overallUtilization.toFixed(1)}%</span></div>
            </div>
            {highestAPR && <div className="bg-rose-500/10 rounded-2xl p-5 border border-rose-500/20"><div className="flex justify-between mb-3"><h3 className="font-semibold text-rose-300">Highest APR</h3><span>⚠️</span></div><div className="text-white font-semibold mb-1">{highestAPR.name}</div><div className="text-rose-400 text-3xl font-bold">{parseFloat(highestAPR.apr).toFixed(2)}%</div><div className="text-xs text-slate-400 mt-2">Priority target for payoff</div></div>}
            {highestBalance && <div className="bg-blue-500/10 rounded-2xl p-5 border border-blue-500/20"><div className="flex justify-between mb-3"><h3 className="font-semibold text-blue-300">Largest Balance</h3><span>💰</span></div><div className="text-white font-semibold mb-1">{highestBalance.name}</div><div className="text-blue-400 text-3xl font-bold">${parseFloat(highestBalance.balance).toFixed(2)}</div></div>}
            {highestUtil && parseFloat(highestUtil.creditLimit) > 0 && <div className="bg-amber-500/10 rounded-2xl p-5 border border-amber-500/20"><div className="flex justify-between mb-3"><h3 className="font-semibold text-amber-300">Highest Utilization</h3><span>📊</span></div><div className="text-white font-semibold mb-1">{highestUtil.name}</div><div className="text-amber-400 text-3xl font-bold">{((parseFloat(highestUtil.balance) / parseFloat(highestUtil.creditLimit)) * 100).toFixed(1)}%</div><div className="text-xs text-slate-400 mt-2">Keep under 30% for better score</div></div>}
            <div className="bg-teal-500/10 rounded-2xl p-5 border border-teal-500/20"><h3 className="font-semibold text-teal-300 mb-3">💡 Financial Tips</h3><ul className="space-y-2 text-sm text-slate-300"><li>• Pay more than the minimum to reduce interest</li><li>• Keep utilization below 30% on all cards</li><li>• Consider balance transfers for high APR cards</li><li>• Set up automatic payments to avoid fees</li></ul></div>
            {cards.length > 0 && <div className="bg-slate-900/50 rounded-2xl p-4 border border-slate-700/50"><h3 className="text-sm font-semibold text-slate-400 mb-3">Your Cards</h3><div className="grid grid-cols-2 gap-2">{cards.map((card, idx) => { const color = getCardColor(idx); return (<div key={card.id} className="flex items-center gap-2"><div className={`w-3 h-3 rounded-full ${color.bg}`}></div><span className="text-xs text-slate-300 truncate">{card.name}</span></div>); })}</div></div>}
            <div className="bg-slate-900/50 rounded-3xl p-6 border border-slate-700/30">
              <h3 className="text-2xl font-semibold text-white mb-1">{monthNames[currentMonth]}</h3>
              <p className="text-slate-400 text-sm mb-4">{currentYear}</p>
              <div className="grid grid-cols-7 gap-1 mb-2">{['S','M','T','W','T','F','S'].map((d,i) => <div key={i} className="text-center text-xs text-slate-500">{d}</div>)}</div>
              <div className="grid grid-cols-7 gap-1">
                {calendarDates.map((day, idx) => {
                  const events = getEventsForDay(day);
                  const isToday = day === today.getDate();
                  return (
                    <div key={idx} className="aspect-square">
                      {day ? <div className={`w-full h-full flex flex-col items-center justify-center rounded-xl text-sm ${isToday ? 'bg-cyan-500 text-white' : events.length > 0 ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>
                        <span>{day}</span>
                        {events.length > 0 && <div className="flex gap-0.5 mt-0.5">{events.map((e,i) => <div key={i} className={`w-1.5 h-1.5 rounded-full ${e.color.bg}`}></div>)}</div>}
                      </div> : null}
                    </div>
                  );
                })}
              </div>
              {cards.some(c => c.dueDate || c.closeDate) && (
                <div className="mt-6 pt-6 border-t border-slate-700/50 space-y-2">
                  {cards.filter(c => c.dueDate || c.closeDate).map((card, idx) => {
                    const color = getCardColor(idx);
                    return (
                      <div key={card.id} className="flex items-center justify-between p-3 bg-slate-800/40 rounded-xl">
                        <div className="flex items-center gap-3"><div className={`w-3 h-3 rounded-full ${color.bg}`}></div><span className="text-sm font-medium text-white">{card.name}</span></div>
                        <div className="flex gap-2 text-xs">
                          {card.dueDate && <div className="bg-rose-500/20 px-2 py-1 rounded-lg border border-rose-500/30 text-rose-300">Due: {new Date(card.dueDate).getDate()}</div>}
                          {card.closeDate && <div className="bg-blue-500/20 px-2 py-1 rounded-lg border border-blue-500/30 text-blue-300">Close: {new Date(card.closeDate).getDate()}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
            <button onClick={onClose} className="w-full bg-slate-800/80 hover:bg-slate-700/80 text-white py-4 rounded-2xl font-semibold border border-slate-700/50">Close</button>
          </div>
        </Modal>
      );
    });

    const HistoryModal = memo(({ isOpen, onClose, history }) => (
      <Modal isOpen={isOpen} onClose={onClose} title="Payment History">
        <div className="p-6">{history.length === 0 ? <div className="text-center py-8 text-slate-400">No payments yet</div> : <div className="space-y-3">{history.map((p) => <div key={p.id} className="bg-slate-900/50 rounded-xl p-4 border border-slate-700"><div className="flex justify-between mb-2"><div className="font-semibold text-white">{p.cardName}</div><div className="text-emerald-400 font-bold">-${p.amount.toFixed(2)}</div></div><div className="text-sm text-slate-400">{new Date(p.date).toLocaleDateString()} • ${p.oldBalance.toFixed(2)} → ${p.newBalance.toFixed(2)}</div></div>)}</div>}</div>
      </Modal>
    ));

    const CardItem = memo(({ card, index, onToggle, isExpanded, onDelete, showDeleteConfirm, onConfirmDelete }) => {
      const minPayment = useMemo(() => calculateMinPayment(card.balance, card.apr, card.issuer), [card.balance, card.apr, card.issuer]);
      const monthlyInterest = useMemo(() => (parseFloat(card.balance) || 0) * ((parseFloat(card.apr) || 0) / 100) / 12, [card.balance, card.apr]);
      const creditLimit = parseFloat(card.creditLimit) || 0;
      const cardBalance = parseFloat(card.balance) || 0;
      const utilization = useMemo(() => creditLimit > 0 ? ((cardBalance / creditLimit) * 100) : 0, [creditLimit, cardBalance]);
      const cardColor = getCardColor(index);
      const minPayoffMonths = useMemo(() => {
        let balance = cardBalance, months = 0;
        const apr = parseFloat(card.apr) || 0;
        const monthlyRate = (apr / 100) / 12;
        const minPay = parseFloat(minPayment);
        while (balance > 0.01 && months < 600) { const interest = balance * monthlyRate; balance += interest; const payment = Math.min(minPay, balance); balance -= payment; months++; }
        const years = Math.floor(months / 12); const rem = months % 12;
        return years > 0 ? `${years}y ${rem}m` : `${rem}m`;
      }, [cardBalance, card.apr, minPayment]);
      return (
        <div className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 backdrop-blur-xl rounded-2xl shadow-xl overflow-hidden border border-cyan-500/15 hover:border-cyan-500/25 transition-all">
          <div className="bg-slate-900/50 px-5 py-4 border-b border-slate-700/50">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-3 flex-1 min-w-0">
                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500/20 to-cyan-500/20 flex items-center justify-center border border-cyan-500/30"><span className={`text-xl ${cardColor.text}`}>{getCardSymbol(index)}</span></div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-slate-100 truncate">{card.name}</div>
                  <div className="text-slate-400 text-xs flex items-center gap-2">
                    <span>{card.apr}% APR</span>
                    {card.dueDate && (() => { const today = new Date(); const due = new Date(card.dueDate); const diffDays = Math.ceil((due - today) / (1000 * 60 * 60 * 24)); if (diffDays >= 0 && diffDays <= 7) return <span className="text-rose-400 font-semibold">• Due in {diffDays}d</span>; if (diffDays > 7 && diffDays <= 14) return <span className="text-amber-400">• Due in {diffDays}d</span>; return null; })()}
                  </div>
                </div>
              </div>
              <button className="text-slate-400 hover:text-slate-300 p-2 rounded-lg transition-colors" onClick={() => onToggle(card.id)}>{isExpanded ? '▲' : '▼'}</button>
            </div>
            <div className="text-3xl font-bold text-white mb-2">${formatCurrency(cardBalance)}</div>
            {utilization > 0 && creditLimit > 0 && (
              <div className="mt-2">
                <div className="flex items-center justify-between text-xs mb-1"><span className="text-slate-400 truncate">Using ${cardBalance.toFixed(2)} of ${creditLimit.toFixed(2)}</span><span className={`font-semibold ml-2 ${utilization > 30 ? 'text-rose-400' : 'text-teal-400'}`}>{utilization.toFixed(1)}%</span></div>
                <div className="w-full bg-slate-700/50 rounded-full h-1.5"><div className={`h-1.5 rounded-full transition-all ${utilization > 30 ? 'bg-gradient-to-r from-rose-500 to-orange-500' : 'bg-gradient-to-r from-teal-500 to-cyan-500'}`} style={{ width: `${Math.min(utilization, 100)}%` }} /></div>
              </div>
            )}
          </div>
          {isExpanded && (
            <div className="p-5">
              <div className="grid grid-cols-2 gap-3 mb-4">
                <div className="bg-teal-500/10 rounded-xl p-4 border border-teal-500/20"><div className="text-xs text-teal-300 mb-1.5">Min Payment</div><div className="font-bold text-teal-100 text-lg">${minPayment}</div></div>
                <div className="bg-amber-500/10 rounded-xl p-4 border border-amber-500/20"><div className="text-xs text-amber-300 mb-1.5">Monthly Interest</div><div className="font-bold text-amber-100 text-lg">${monthlyInterest.toFixed(2)}</div></div>
              </div>
              {cardBalance > 0 && <div className="mb-4 p-4 bg-blue-500/10 rounded-xl border border-blue-500/20"><div className="text-xs text-blue-300 mb-1">If Paid Minimum Only</div><div className="font-bold text-blue-100 text-lg">{minPayoffMonths}</div></div>}
              {creditLimit > 0 && <div className="mb-4 p-4 bg-slate-900/50 rounded-xl border border-slate-700/50"><div className="flex justify-between"><div><div className="text-xs text-slate-400 mb-1">Available</div><div className={`text-2xl font-bold ${cardColor.text}`}>${(creditLimit - cardBalance).toFixed(2)}</div></div><div className="text-right"><div className="text-xs text-slate-400 mb-1">Limit</div><div className="text-lg font-semibold text-slate-300">${creditLimit.toFixed(2)}</div></div></div></div>}
              {showDeleteConfirm === card.id ? <div className="flex gap-3"><button onClick={() => onConfirmDelete(card.id)} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 rounded-xl">Confirm Delete</button><button onClick={() => onDelete(null)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl">Cancel</button></div> : <button onClick={() => onDelete(card.id)} className="text-sm text-rose-400 hover:text-rose-300 font-semibold py-2">Remove Card</button>}
            </div>
          )}
        </div>
      );
    });

    function DebtDash() {
      const [cards, setCards] = useLocalStorage('debt-cards', []);
      const [monthlyPaymentBudget, setMonthlyPaymentBudget] = useLocalStorage('monthly-payment-budget', '0');
      const [paymentHistory, setPaymentHistory] = useLocalStorage('payment-history', []);
      const [savingsGoal, setSavingsGoal] = useLocalStorage('savings-goal', '0');
      const [availableFunds, setAvailableFunds] = useLocalStorage('available-funds', '0');
      const [isAdding, setIsAdding] = useState(false);
      const [expandedCard, setExpandedCard] = useState(null);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
      const [showQuickEdit, setShowQuickEdit] = useState(false);
      const [showFundsManager, setShowFundsManager] = useState(false);
      const [showMakePayment, setShowMakePayment] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [showCalculator, setShowCalculator] = useState(false);
      const [showInsights, setShowInsights] = useState(false);
      const [notification, setNotification] = useState(null);
      const [newCard, setNewCard] = useState({ name: '', balance: '', creditLimit: '', apr: '', issuer: 'chase', dueDate: '', closeDate: '' });

      useEffect(() => { lucide.createIcons(); });

      const showNotification = useCallback((message, type = 'success') => { setNotification({ message, type }); setTimeout(() => setNotification(null), 3000); }, []);

      const stats = useMemo(() => {
        const totalDebt = cards.reduce((s, c) => s + parseFloat(c.balance || 0), 0);
        const totalMinPayment = cards.reduce((s, c) => s + parseFloat(calculateMinPayment(c.balance, c.apr, c.issuer || 'chase')), 0);
        const totalMonthlyInterest = cards.reduce((s, c) => s + (parseFloat(c.balance || 0) * (parseFloat(c.apr || 0) / 100) / 12), 0);
        const totalCreditLimit = cards.reduce((s, c) => s + (parseFloat(c.creditLimit) || 0), 0);
        const overallUtilization = totalCreditLimit > 0 ? (totalDebt / totalCreditLimit) * 100 : 0;
        return { totalDebt, totalMinPayment, totalMonthlyInterest, totalCreditLimit, overallUtilization };
      }, [cards]);

      const handleUpdateBalances = useCallback((newBalances) => {
        const updatedCards = cards.map(card => {
          const newBalance = parseFloat(newBalances[card.id]) || 0;
          const oldBalance = parseFloat(card.balance) || 0;
          if (newBalance !== oldBalance && newBalance < oldBalance) setPaymentHistory(prev => [{ id: Date.now() + Math.random(), cardName: card.name, oldBalance, newBalance, amount: oldBalance - newBalance, date: new Date().toISOString() }, ...prev]);
          return { ...card, balance: newBalance.toFixed(2) };
        });
        setCards(updatedCards); showNotification('Balances updated!');
      }, [cards, setCards, setPaymentHistory, showNotification]);

      const handleMakePayment = useCallback((cardId, amount) => {
        const card = cards.find(c => c.id === cardId);
        if (!card) return;
        const oldBalance = parseFloat(card.balance);
        const newBalance = Math.max(0, oldBalance - amount);
        setCards(prev => prev.map(c => c.id === cardId ? { ...c, balance: newBalance.toFixed(2) } : c));
        setPaymentHistory(prev => [{ id: Date.now(), cardName: card.name, oldBalance, newBalance, amount, date: new Date().toISOString() }, ...prev]);
        showNotification(`Payment of $${amount.toFixed(2)} recorded!`);
      }, [cards, setCards, setPaymentHistory, showNotification]);

      const handleAddCard = useCallback(() => {
        const { name, balance, apr, creditLimit, issuer, dueDate, closeDate } = newCard;
        if (!name.trim() || !validateNumber(balance, 0) || !validateNumber(apr, 0)) { showNotification('Please fill all required fields', 'error'); return; }
        setCards(prev => [...prev, { id: Date.now(), name: name.trim(), balance: parseFloat(balance).toFixed(2), creditLimit: creditLimit ? parseFloat(creditLimit).toFixed(2) : '0', apr: parseFloat(apr).toFixed(2), issuer, dueDate, closeDate }]);
        setNewCard({ name: '', balance: '', creditLimit: '', apr: '', issuer: 'chase', dueDate: '', closeDate: '' });
        setIsAdding(false); showNotification('Card added!');
      }, [newCard, setCards, showNotification]);

      const handleDeleteCard = useCallback((id) => { setCards(prev => prev.filter(c => c.id !== id)); setShowDeleteConfirm(null); showNotification('Card removed'); }, [setCards, showNotification]);

      const handleExport = useCallback(() => {
        const data = JSON.stringify({ cards, monthlyPaymentBudget, paymentHistory, savingsGoal, availableFunds, exportDate: new Date().toISOString(), version: '2.2' }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `debt-dash-${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(url);
        showNotification('Backup downloaded!');
      }, [cards, monthlyPaymentBudget, paymentHistory, savingsGoal, availableFunds, showNotification]);

      const handleImport = useCallback((e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.cards) setCards(data.cards);
            if (data.monthlyPaymentBudget) setMonthlyPaymentBudget(data.monthlyPaymentBudget);
            if (data.paymentHistory) setPaymentHistory(data.paymentHistory);
            if (data.savingsGoal) setSavingsGoal(data.savingsGoal);
            if (data.availableFunds) setAvailableFunds(data.availableFunds);
            showNotification('Data restored!');
          } catch { showNotification('Invalid file', 'error'); }
        };
        reader.readAsText(file); e.target.value = '';
      }, [setCards, setMonthlyPaymentBudget, setPaymentHistory, setSavingsGoal, setAvailableFunds, showNotification]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950/20">
          {notification && <Notification message={notification.message} type={notification.type} />}
          <QuickEditModal isOpen={showQuickEdit} onClose={() => setShowQuickEdit(false)} cards={cards} onUpdateBalances={handleUpdateBalances} />
          <FundsManagerModal isOpen={showFundsManager} onClose={() => setShowFundsManager(false)} currentFunds={savingsGoal} availableFunds={availableFunds} onUpdateFunds={(ns, na) => { setSavingsGoal(ns); setAvailableFunds(na); showNotification('Funds updated!'); }} />
          <MakePaymentModal isOpen={showMakePayment} onClose={() => setShowMakePayment(false)} cards={cards} onMakePayment={handleMakePayment} />
          <PayoffCalculatorModal isOpen={showCalculator} onClose={() => setShowCalculator(false)} cards={cards} monthlyBudget={monthlyPaymentBudget} setMonthlyBudget={setMonthlyPaymentBudget} totalMinPayment={stats.totalMinPayment} />
          <InsightsModal isOpen={showInsights} onClose={() => setShowInsights(false)} cards={cards} stats={stats} />
          <HistoryModal isOpen={showHistory} onClose={() => setShowHistory(false)} history={paymentHistory} />

          <div className="bg-gradient-to-br from-blue-600 via-cyan-600 to-teal-600 px-6 pt-12 pb-32 shadow-2xl">
            <div className="flex items-center justify-between">
              <div><h1 className="text-white text-3xl font-bold">Debt Dash</h1><p className="text-blue-50/90 text-sm mt-1">Your path to financial freedom</p></div>
              <button onClick={() => setShowHistory(true)} className="bg-white/20 backdrop-blur-md px-4 py-2.5 rounded-xl border border-white/30 flex items-center gap-2 text-white text-sm font-semibold hover:bg-white/30 transition-all">📋 History</button>
            </div>
          </div>

          <div className="max-w-2xl mx-auto px-4 -mt-24 pb-20">
            <div onClick={() => setShowQuickEdit(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 backdrop-blur-xl rounded-2xl shadow-2xl p-6 mb-6 border border-cyan-500/20 cursor-pointer hover:border-cyan-400/40 transition-all group">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3"><div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-600 flex items-center justify-center shadow-lg">📉</div><span className="text-slate-100 font-semibold">Total Debt</span></div>
                <span className="text-cyan-400 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✏️ Edit</span>
              </div>
              <div className="text-4xl font-bold text-white mb-2">${formatCurrency(stats.totalDebt)}</div>
              <div className="flex items-center justify-between mb-3"><div className="text-sm text-slate-400">{cards.length} card{cards.length !== 1 ? 's' : ''}</div><div className="text-sm text-cyan-400">Min: ${stats.totalMinPayment.toFixed(2)}</div></div>
              {parseFloat(savingsGoal) > 0 && <div className="pt-3 border-t border-slate-700/50"><div className="flex justify-between mb-2"><span className="text-slate-400 text-sm">Funds Ready</span><span className="text-teal-400 text-sm font-semibold">-${parseFloat(savingsGoal).toFixed(2)}</span></div><div className="flex justify-between"><span className="text-slate-300 text-sm font-semibold">What I Still Owe</span><span className={`text-lg font-bold ${(stats.totalDebt - parseFloat(savingsGoal)) > 0 ? 'text-amber-400' : 'text-teal-400'}`}>${Math.max(0, stats.totalDebt - parseFloat(savingsGoal)).toFixed(2)}</span></div></div>}
              {stats.totalMonthlyInterest > 0 && <div className="mt-4 pt-4 border-t border-slate-700/50 text-amber-400 text-sm">⚠️ ~${stats.totalMonthlyInterest.toFixed(2)}/mo interest • ${(stats.totalMonthlyInterest * 12).toFixed(2)}/yr</div>}
              {stats.overallUtilization > 0 && <div className="mt-3 pt-3 border-t border-slate-700/50"><div className="flex justify-between mb-2"><span className="text-slate-400 text-sm">Utilization</span><span className={`text-sm font-semibold ${stats.overallUtilization > 30 ? 'text-rose-400' : 'text-teal-400'}`}>{stats.overallUtilization.toFixed(1)}%</span></div><div className="w-full bg-slate-700/50 rounded-full h-2.5"><div className={`h-2.5 rounded-full ${stats.overallUtilization > 30 ? 'bg-gradient-to-r from-rose-500 to-orange-500' : 'bg-gradient-to-r from-teal-500 to-cyan-500'}`} style={{ width: `${Math.min(stats.overallUtilization, 100)}%` }} /></div></div>}
            </div>

            <div onClick={() => setShowFundsManager(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 backdrop-blur-xl rounded-2xl shadow-xl p-6 mb-6 border border-teal-500/20 hover:border-teal-400/30 transition-all cursor-pointer group">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3"><div className="w-12 h-12 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center justify-center shadow-lg">👛</div><div><span className="text-slate-100 font-semibold block">Account Balance</span><span className="text-xs text-slate-400">Track your funds</span></div></div>
                <span className="text-teal-400 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✏️ Edit</span>
              </div>
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div><label className="text-xs text-slate-400 block mb-1">For Debt Payment</label><div className="text-2xl font-bold text-white">${parseFloat(savingsGoal || 0).toFixed(2)}</div></div>
                <div><label className="text-xs text-slate-400 block mb-1">Total Available</label><div className="text-2xl font-bold text-white">${parseFloat(availableFunds || 0).toFixed(2)}</div></div>
              </div>
              {parseFloat(availableFunds || 0) > 0 && <div className="pt-4 border-t border-slate-700/50"><div className="flex justify-between mb-3"><span className="text-slate-400 text-sm">Free to Spend</span><span className={`text-lg font-bold ${(parseFloat(availableFunds || 0) - parseFloat(savingsGoal || 0)) >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>${Math.max(0, parseFloat(availableFunds || 0) - parseFloat(savingsGoal || 0)).toFixed(2)}</span></div>{parseFloat(savingsGoal || 0) > 0 && <button onClick={(e) => { e.stopPropagation(); setShowMakePayment(true); }} className="w-full bg-gradient-to-r from-teal-600 to-cyan-600 hover:from-teal-700 hover:to-cyan-700 text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-lg transition-all">💵 Make a Payment</button>}</div>}
            </div>

            <div className="grid grid-cols-2 gap-3 mb-6">
              <button onClick={() => setShowCalculator(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 text-white p-4 rounded-xl border border-blue-500/20 hover:border-blue-400/40 transition-all shadow-lg"><div className="flex items-center gap-2 mb-2"><span className="text-blue-400">🧮</span><span className="text-sm font-semibold text-slate-100">Calculator</span></div><div className="text-xs text-slate-400">Plan payoff</div></button>
              <button onClick={() => setShowInsights(true)} className="bg-gradient-to-br from-slate-900/98 to-slate-800/98 text-white p-4 rounded-xl border border-cyan-500/20 hover:border-cyan-400/40 transition-all shadow-lg"><div className="flex items-center gap-2 mb-2"><span className="text-cyan-400">📊</span><span className="text-sm font-semibold text-slate-100">Insights</span></div><div className="text-xs text-slate-400">Analysis</div></button>
            </div>

            {isAdding && (
              <div className="bg-slate-800/90 backdrop-blur-xl rounded-2xl shadow-xl p-6 mb-6 border border-slate-700/50">
                <div className="flex items-center justify-between mb-5"><h3 className="font-bold text-white text-lg">Add New Card</h3><button onClick={() => setIsAdding(false)} className="text-slate-400 hover:text-white p-2 rounded-lg">✕</button></div>
                <div className="space-y-4">
                  <input type="text" placeholder="Card Name (e.g., Chase Freedom)" value={newCard.name} onChange={(e) => setNewCard(prev => ({ ...prev, name: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-white placeholder-slate-500" />
                  <select value={newCard.issuer} onChange={(e) => setNewCard(prev => ({ ...prev, issuer: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-white">
                    <option value="chase">Chase</option><option value="navyfed">Navy Federal</option><option value="discover">Discover</option><option value="other">Other</option>
                  </select>
                  <input type="number" placeholder="Current Balance" value={newCard.balance} onChange={(e) => setNewCard(prev => ({ ...prev, balance: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-white placeholder-slate-500" step="0.01" />
                  <input type="number" placeholder="Credit Limit" value={newCard.creditLimit} onChange={(e) => setNewCard(prev => ({ ...prev, creditLimit: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-white placeholder-slate-500" step="0.01" />
                  <input type="number" placeholder="APR % (e.g., 18.99)" value={newCard.apr} onChange={(e) => setNewCard(prev => ({ ...prev, apr: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-white placeholder-slate-500" step="0.01" />
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-xs text-slate-400 mb-1 block">Payment Due Date</label><input type="date" value={newCard.dueDate} onChange={(e) => setNewCard(prev => ({ ...prev, dueDate: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-white" /></div>
                    <div><label className="text-xs text-slate-400 mb-1 block">Statement Close Date</label><input type="date" value={newCard.closeDate} onChange={(e) => setNewCard(prev => ({ ...prev, closeDate: e.target.value }))} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-white" /></div>
                  </div>
                  <div className="flex gap-3 pt-2">
                    <button onClick={handleAddCard} className="flex-1 bg-gradient-to-r from-cyan-600 to-teal-600 hover:from-cyan-700 hover:to-teal-700 text-white py-3 rounded-xl font-semibold transition-all">Add Card</button>
                    <button onClick={() => setIsAdding(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-semibold transition-all">Cancel</button>
                  </div>
                </div>
              </div>
            )}

            {cards.length === 0 && !isAdding && (
              <div className="bg-slate-900/50 rounded-2xl p-12 mb-6 border border-slate-700/30 text-center">
                <div className="text-6xl mb-4">💳</div>
                <h3 className="text-xl font-bold text-white mb-2">Start Your Debt Journey</h3>
                <p className="text-slate-400 mb-6">Add your first credit card to begin tracking</p>
                <button onClick={() => setIsAdding(true)} className="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-6 py-3 rounded-xl font-semibold inline-flex items-center gap-2 shadow-xl">➕ Add Your First Card</button>
              </div>
            )}

            {cards.length > 0 && <div className="space-y-3 mb-6">{cards.map((card, i) => <CardItem key={card.id} card={card} index={i} onToggle={(id) => setExpandedCard(expandedCard === id ? null : id)} isExpanded={expandedCard === card.id} onDelete={setShowDeleteConfirm} showDeleteConfirm={showDeleteConfirm} onConfirmDelete={handleDeleteCard} />)}</div>}

            <div className="pb-8">
              <div className="flex gap-3 mb-3">
                <button onClick={handleExport} className="flex-1 flex items-center justify-center gap-2 bg-slate-800/90 hover:bg-slate-700 text-slate-300 px-4 py-3 rounded-xl font-medium border border-slate-700/50 transition-colors">⬇️ Export</button>
                <label className="flex-1 flex items-center justify-center gap-2 bg-slate-800/90 hover:bg-slate-700 text-slate-300 px-4 py-3 rounded-xl font-medium border border-slate-700/50 cursor-pointer transition-colors">⬆️ Import<input type="file" accept=".json" onChange={handleImport} className="hidden" /></label>
              </div>
              {!isAdding && <button onClick={() => setIsAdding(true)} className="w-full bg-gradient-to-r from-cyan-600 to-teal-600 hover:from-cyan-700 hover:to-teal-700 text-white py-4 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-xl transition-all">➕ Add Credit Card</button>}
            </div>
            <div className="text-center pb-4 pt-4 border-t border-slate-800/50">
              <p className="text-slate-500 text-xs">Data saved locally • No servers • Complete privacy</p>
              <p className="text-slate-600 text-xs mt-1">Debt Dash v2.2</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DebtDash));
  </script>
</body>
</html>
